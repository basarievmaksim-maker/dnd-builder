<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast D&D Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0a0a0a; color: #e2e8f0; font-family: 'Roboto', sans-serif; min-height: 100vh; position: relative; overflow-x: hidden; }

        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('images/bg/main-bg.jpg') center/cover; z-index: -2; filter: brightness(0.4); }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(10,10,20,0.8) 100%); z-index: -1; }
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .fantasy-title { font-family: 'Cinzel', serif; text-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
        
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid rgba(245, 158, 11, 0.2); background: rgba(30, 30, 40, 0.85); backdrop-filter: blur(10px); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .card:hover { border-color: rgba(245, 158, 11, 0.6); transform: translateY(-4px); box-shadow: 0 10px 40px rgba(245, 158, 11, 0.3); }
        .card:active { transform: translateY(-2px) scale(0.98); }
        .card.selected { border-color: rgba(245, 158, 11, 1); background: rgba(39, 39, 42, 0.95); box-shadow: 0 0 30px rgba(245, 158, 11, 0.5), inset 0 0 20px rgba(245, 158, 11, 0.1); transform: translateY(-2px); }

        .class-icon { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 2px solid rgba(245, 158, 11, 0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .race-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(245, 158, 11, 0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .icon-placeholder, .race-icon-placeholder { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f59e0b, #d97706); color: black; border: 2px solid rgba(245, 158, 11, 0.5); }
        .icon-placeholder { width: 64px; height: 64px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        .race-icon-placeholder { width: 48px; height: 48px; border-radius: 50%; font-size: 20px; font-weight: bold; }

        .stat-btn { background: linear-gradient(135deg, #334155, #1e293b); color: white; width: 44px; height: 44px; border-radius: 8px; font-weight: bold; font-size: 20px; border: 2px solid rgba(245, 158, 11, 0.3); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .stat-btn:hover:not(:disabled) { background: linear-gradient(135deg, #f59e0b, #d97706); color: black; box-shadow: 0 0 15px rgba(245, 158, 11, 0.5); }
        .stat-btn:active:not(:disabled) { transform: scale(0.95); }
        .stat-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .spell-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin-right: 4px; font-weight: 600; }
        .spell-tag.cantrip { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; }
        .spell-tag.level1 { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; }

        .copy-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 14px 28px; border-radius: 10px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4); font-size: 16px; }
        .copy-toast.show { opacity: 1; }

        .points-counter { background: linear-gradient(135deg, #f59e0b, #d97706); color: black; padding: 12px 24px; border-radius: 10px; font-weight: bold; display: inline-block; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); font-size: 18px; }

        .desc-box { background: rgba(30, 41, 59, 0.8); padding: 10px 14px; border-radius: 8px; margin: 6px 0; font-size: 13px; border-left: 3px solid #f59e0b; backdrop-filter: blur(5px); }

        .info-button { display: inline-flex; align-items: center; gap: 6px; padding: 12px 24px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border-radius: 10px; font-weight: bold; text-decoration: none; transition: all 0.2s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); font-size: 16px; }
        .info-button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); }

        .stat-recommended { border: 2px solid rgba(245, 158, 11, 0.8) !important; background: linear-gradient(135deg, rgba(39, 39, 42, 0.9), rgba(51, 51, 61, 0.9)) !important; box-shadow: 0 0 20px rgba(245, 158, 11, 0.3) !important; }
        .stat-primary { border-left: 4px solid #f59e0b !important; }
        .tip-banner { background: linear-gradient(135deg, rgba(30, 58, 95, 0.9), rgba(15, 23, 42, 0.9)); border: 1px solid rgba(59, 130, 246, 0.5); border-radius: 10px; padding: 14px; margin-bottom: 18px; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tip-primary { color: #f59e0b; font-weight: bold; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .tip-secondary { color: #60a5fa; font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 4px; }

        @media (max-width: 640px) {
            body { font-size: 14px; }
            .p-8 { padding: 16px !important; }
            .text-5xl { font-size: 2rem !important; }
            .text-4xl { font-size: 1.75rem !important; }
            .text-3xl { font-size: 1.5rem !important; }
            .grid-cols-3, .grid-cols-2 { grid-template-columns: 1fr !important; }
            .card { padding: 16px !important; margin-bottom: 12px; }
            .class-icon { width: 48px; height: 48px; }
            .race-icon { width: 40px; height: 40px; }
            .lg\:grid-cols-3, .md\:grid-cols-2, .md\:grid-cols-3, .md\:grid-cols-4 { grid-template-columns: 1fr !important; }
            .gap-4 { gap: 12px !important; }
            .flex.gap-4 { flex-direction: column; gap: 10px !important; }
            .flex.gap-4 button { width: 100%; }
            .grid-cols-4 { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
            .tip-banner { padding: 12px; font-size: 13px; }
        }

        #character-sheet { 
            display: none; 
            background: white; 
            color: #1a1a1a; 
            padding: 20px; 
            font-family: 'Arial', sans-serif;
            font-size: 11px;
            line-height: 1.4;
            max-width: 800px;
            margin: 0 auto;
        }
        .pdf-header { text-align: center; border-bottom: 3px solid #d97706; padding-bottom: 10px; margin-bottom: 15px; }
        .pdf-title { font-size: 24px; font-weight: bold; color: #d97706; margin: 0; }
        .pdf-section { margin-bottom: 12px; padding: 10px; background: #f9fafb; border-radius: 5px; border: 1px solid #e5e7eb; }
        .pdf-section-title { font-size: 14px; font-weight: bold; color: #d97706; margin-bottom: 8px; border-bottom: 2px solid #d97706; padding-bottom: 3px; }
        .pdf-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .pdf-stat-box { background: white; padding: 6px; border-radius: 4px; text-align: center; border: 1px solid #d1d5db; }
        .pdf-stat-label { font-size: 10px; color: #6b7280; font-weight: 600; }
        .pdf-stat-value { font-size: 18px; font-weight: bold; color: #d97706; margin: 2px 0; }
        .pdf-stat-mod { font-size: 12px; color: #10b981; }
        .pdf-info-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 11px; }
        .pdf-info-label { color: #6b7280; font-weight: 600; }
        .pdf-ability { background: white; padding: 6px; margin: 4px 0; border-radius: 4px; border-left: 3px solid #d97706; font-size: 10px; }
        .pdf-ability-name { font-weight: bold; color: #d97706; }
        .pdf-footer { text-align: center; margin-top: 20px; padding-top: 10px; border-top: 2px solid #d97706; color: #9ca3af; font-size: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <canvas id="particles-canvas"></canvas>

    <header class="text-center mb-6 relative z-10 animate-fade-in w-full max-w-5xl mx-auto px-4">
        <h1 class="text-5xl font-bold text-amber-500 mb-2 fantasy-title">️ Fast D&D Builder</h1>
        <p class="text-gray-300 mb-3 text-base md:text-lg">Создай персонажа за 3 минуты • Шаг <span id="step-indicator" class="text-amber-400 font-bold">1</span> из <span id="total-steps" class="text-amber-400 font-bold">5</span></p>
        <div class="flex gap-3 justify-center flex-wrap">
            <button onclick="randomize()" class="px-5 py-2.5 bg-gradient-to-r from-purple-600 to-purple-500 hover:from-purple-500 hover:to-purple-400 rounded-lg font-bold text-sm transition shadow-lg hover:shadow-purple-500/50 active:scale-95">🎲 Случайный</button>
            <button onclick="clearSave()" class="px-5 py-2.5 bg-gradient-to-r from-gray-600 to-gray-500 hover:from-gray-500 hover:to-gray-400 rounded-lg font-bold text-sm transition shadow-lg active:scale-95">🗑️ Сброс</button>
        </div>
    </header>

    <main id="app-container" class="w-full max-w-5xl bg-gray-900/80 p-6 md:p-8 rounded-2xl shadow-2xl border border-amber-600/30 backdrop-blur-xl relative z-10 mx-2 md:mx-0"></main>

    <div class="flex gap-4 mt-6 w-full max-w-5xl justify-between relative z-10 px-2 md:px-0 flex-wrap md:flex-nowrap">
        <button id="btn-back" onclick="prevStep()" class="hidden px-6 py-3 bg-gradient-to-r from-gray-700 to-gray-600 hover:from-gray-600 hover:to-gray-500 rounded-lg font-bold transition shadow-lg border border-amber-600/30 flex-1 md:flex-none active:scale-95">← Назад</button>
        <button id="btn-next" onclick="nextStep()" class="px-6 py-3 bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-black rounded-lg font-bold transition shadow-lg hover:shadow-amber-500/50 border border-amber-400/50 flex-1 md:flex-none ml-auto active:scale-95">Далее →</button>
    </div>

    <div id="copy-toast" class="copy-toast">✅ Лист скопирован в буфер обмена!</div>

    <div id="character-sheet">

            <h1 class="pdf-title">📜 ЛИСТ ПЕРСОНАЖА D&D 5e</h1>

        </div>
        <div id="sheet-content"></div>
        <div class="pdf-footer">
            Создано в Fast D&D Builder • <span id="pdf-date"></span>
        </div>
    </div>

        const raceEmojis = { human: '🧑', elf: '🧝', dwarf: '🧔', gnome: '🧚', halfling: '', halfelf: '🧝♂️', halforc: '👹', tiefling: '😈', dragonborn: '🐉' };
        const classIcons = { barbarian: 'images/classes/barbarian.png', bard: 'images/classes/bard.png', cleric: 'images/classes/cleric.png', druid: 'images/classes/druid.png', fighter: 'images/classes/fighter.png', monk: 'images/classes/monk.png', paladin: 'images/classes/paladin.png', ranger: 'images/classes/ranger.png', rogue: 'images/classes/rogue.png', sorcerer: 'images/classes/sorcerer.png', warlock: 'images/classes/warlock.png', wizard: 'images/classes/wizard.png' };
        const raceIcons = { human: 'images/races/human.png', elf: 'images/races/elf.png', dwarf: 'images/races/dwarf.png', gnome: 'images/races/gnome.png', halfling: 'images/races/halfling.png', halfelf: 'images/races/halfelf.png', halforc: 'images/races/halforc.png', tiefling: 'images/races/tiefling.png', dragonborn: 'images/races/dragonborn.png' };

        const races = [

            { id: 'elf', name: 'Эльф', bonus: { dex: 2 }, speed: 30, desc: '+2 Ловкость. Грациозные долгожители с тёмным зрением.', abilities: [{ name: 'Тёмное зрение', desc: 'Вы видите в темноте на расстоянии до 60 футов как при тусклом свете' }, { name: 'Fey Ancestry', desc: 'Преимущество на спасброски от очарования и иммунитет к магическому сну' }, { name: 'Транс', desc: 'Эльфы не спят, а медитируют 4 часа в день (как 8 часов сна)' }, { name: 'Восприятие', desc: 'Вы владеете навыком Восприятие' }] },
            { id: 'dwarf', name: 'Дварф', bonus: { con: 2 }, speed: 25, desc: '+2 Телосложение. Крепкие воины и кузнецы.', abilities: [{ name: 'Тёмное зрение', desc: 'Вы видите в темноте на расстоянии до 60 футов' }, { name: 'Дварфийская устойчивость', desc: 'Преимущество на спасброски от яда и сопротивление урону ядом' }, { name: 'Владение оружием', desc: 'Вы владеете боевыми топорами, ручными топорами, лёгкими и тяжёлыми молотами' }] },

            paladin: { cantrips: [], level1: [{name:'Благословение',desc:'До трёх существ добавляют 1d4 к броскам атаки и спасброскам'},{name:'Лечение ран',desc:'1d8+мод хитов'},{name:'Кара гнева',desc:'Следующая атака наносит +2d8 урона излучением'},{name:'Щит веры',desc:'Защитный щит с хитами'},{name:'Обнаружение зла и добра',desc:'Чувствуешь фей, исчадий, нежить'},{name:'Героизм',desc:'Временные хиты и иммунитет к испугу'}] },
            ranger: { cantrips: [], level1: [{name:'Лечение ран',desc:'1d8+мод хитов'},{name:'Охотничья метка',desc:'Помечаешь врага: +1d6 урона против него'},{name:'Туманное облако',desc:'Облако тумана в радиусе 20 футов'},{name:'Долгий шаг',desc:'Увеличиваешь скорость цели на 10 футов на 1 час'},{name:'Обнаружение магии',desc:'Чувствуешь магию'},{name:'Прыжок',desc:'Утраиваешь прыжковую способность цели'}] },
            druid: { cantrips: [{name:'Друидство',desc:'Создаёшь маленький природный эффект: цветок, искра, звук'},{name:'Устойчивость',desc:'1d4 к одной проверке характеристики'},{name:'Ядовитые брызги',desc:'Конус яда наносит 1d12 урона ядом'},{name:'Произвести пламя',desc:'Создаёшь огонь в руке: ближний бой или метание'},{name:'Сопротивление',desc:'1d4 к спасброску'}], level1: [{name:'Лечение ран',desc:'1d8+мод хитов'},{name:'Создание или уничтожение воды',desc:'Создаёшь 10 галлонов воды или уничтожаешь'},{name:'Фаэри файр',desc:'Подсвечиваешь существ: атаки по ним с преимуществом'},{name:'Прыжок',desc:'Утраиваешь прыжок'},{name:'Долгий шаг',desc:'+10 фт скорости'},{name:'Разговор с животными',desc:'Общаешься с животными'},{name:'Обнаружение магии',desc:'Чувствуешь магию'}] }
        };

        let currentStep = 1;
        let character = { name: '', race: null, class: null, background: null, stats: { str: 8, dex: 8, con: 8, int: 8, wis: 8, cha: 8 }, spells: { cantrips: [], level1: [] }, skills: [] };
        const statNames = { str: 'Сила', dex: 'Ловкость', con: 'Телосложение', int: 'Интеллект', wis: 'Мудрость', cha: 'Харизма' };
        const statKeys = ['str', 'dex', 'con', 'int', 'wis', 'cha'];

        function saveToLocalStorage() { localStorage.setItem('dnd_char', JSON.stringify(character)); localStorage.setItem('dnd_step', currentStep); }
        function loadFromLocalStorage() { const savedChar = localStorage.getItem('dnd_char'); const savedStep = localStorage.getItem('dnd_step'); if (savedChar) { character = JSON.parse(savedChar); if (savedStep) currentStep = parseInt(savedStep); } }
        function clearSave() { localStorage.removeItem('dnd_char'); localStorage.removeItem('dnd_step'); location.reload(); }

        function getPointCost(value) { if (value <= 13) return value - 8; if (value === 14) return 7; if (value === 15) return 9; return 0; }
        function getTotalPointsUsed() { let t = 0; for (let k in character.stats) t += getPointCost(character.stats[k]); return t; }
        function getPointsRemaining() { return 27 - getTotalPointsUsed(); }

        function getTotalSteps() { return character.class?.magic ? 5 : 4; }
        function getCurrentDisplayStep() { if (!character.class?.magic && currentStep >= 5) return currentStep - 1; return currentStep; }

        function render() {
            saveToLocalStorage();
            document.getElementById('step-indicator').innerText = getCurrentDisplayStep();
            document.getElementById('total-steps').innerText = getTotalSteps();
            const container = document.getElementById('app-container');
            const btnBack = document.getElementById('btn-back');
            const btnNext = document.getElementById('btn-next');
            btnBack.classList.toggle('hidden', currentStep === 1);
            btnNext.innerText = currentStep === (character.class?.magic ? 5 : 4) ? '✅ Завершить' : 'Далее →';

            if (currentStep === 1) renderStep1(container);
            else if (currentStep === 2) renderStep2(container);
            else if (currentStep === 3) renderStep3(container);
            else if (currentStep === 4) renderStep4(container);
            else if (currentStep === 5) renderStep5(container);
        }

        function renderStep1(container) { container.innerHTML = `<h2 class="text-3xl font-bold text-amber-500 mb-6 fantasy-title animate-fade-in">🌟 Шаг 1: Выбери расу</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-4">${races.map(r => `<div class="card p-5 rounded-xl ${character.race?.id === r.id ? 'selected' : ''} animate-fade-in" onclick="selectRace('${r.id}')"><div class="flex items-center gap-4 mb-3"><img src="${raceIcons[r.id]}" alt="${r.name}" class="race-icon" onerror="handleImageError(this, '${raceEmojis[r.id]}', 'race')"><div><h3 class="text-xl font-bold text-amber-400">${r.name}</h3><p class="text-xs text-blue-400">Скорость: ${r.speed} фт</p></div></div><p class="text-sm text-gray-300 mb-3">${r.desc}</p><div class="text-xs space-y-1">${r.abilities.map(a => `<div class="text-purple-300">• ${a.name}</div>`).join('')}</div></div>`).join('')}</div>`; }
        function renderStep2(container) { container.innerHTML = `<h2 class="text-3xl font-bold text-amber-500 mb-6 fantasy-title animate-fade-in">⚔️ Шаг 2: Выбери класс</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${classes.map(c => `<div class="card p-5 rounded-xl ${character.class?.id === c.id ? 'selected' : ''} animate-fade-in" onclick="selectClass('${c.id}')"><div class="flex items-center gap-4 mb-3"><img src="${classIcons[c.id]}" alt="${c.name}" class="class-icon" onerror="handleImageError(this, '${classEmojis[c.id]}', 'class')"><div class="flex-1"><div class="flex justify-between items-center"><h3 class="text-xl font-bold text-amber-400">${c.name}</h3><span class="text-xs ${c.magic ? 'bg-purple-600' : 'bg-gray-600'} px-2 py-1 rounded font-bold">${c.magic ? '✨ Маг' : '⚔️ Воин'}</span></div><p class="text-xs text-gray-400 mt-1">Кость хитов: <b class="text-amber-500">d${c.hitDie}</b></p></div></div><p class="text-sm text-gray-300 mb-2">${c.desc}</p><div class="text-xs text-gray-400 mb-2">Главная: <b class="text-amber-500">${c.primary}</b></div>${c.magic ? `<div class="text-xs text-purple-400">✨ ${c.cantrips} заговоров + ${c.spells1} заклинаний</div>` : ''}</div>`).join('')}</div>`; }
        function renderStep3(container) { container.innerHTML = `<h2 class="text-3xl font-bold text-amber-500 mb-6 fantasy-title animate-fade-in"> Шаг 3: Происхождение</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${backgrounds.map(b => `<div class="card p-5 rounded-xl ${character.background?.id === b.id ? 'selected' : ''} animate-fade-in" onclick="selectBackground('${b.id}')"><h3 class="text-xl font-bold text-amber-400 mb-2">${b.name}</h3><p class="text-sm text-gray-300 mb-3">${b.desc}</p><div class="text-sm"><span class="text-gray-400">Навыки:</span> <b class="text-amber-500">${b.skills.join(', ')}</b></div></div>`).join('')}</div>`; }
        function renderStep4(container) {
            let pointsRemaining = getPointsRemaining();
            let statTipsHtml = character.class?.statTips ? `<div class="tip-banner"><div class="text-sm"><span class="tip-primary"> Главная:</span> ${statNames[character.class.statTips.primary]} • <span class="tip-secondary"> Вторичная:</span> ${statNames[character.class.statTips.secondary]}</div><div class="text-xs text-gray-400 mt-1">${character.class.statTips.tip}</div></div>` : `<div class="tip-banner"><div class="text-sm text-gray-300">💡 Выбери класс для рекомендаций.</div></div>`;
            let statsHtml = '';
            for (let key of statKeys) {
                let base = character.stats[key];
                let bonus = character.race ? (character.race.bonus[key] || 0) : 0;
                let final = base + bonus;
                let mod = Math.floor((final - 10) / 2);
                let modStr = mod >= 0 ? `+${mod}` : mod;
                let cost = getPointCost(base);
                const isRec = character.class?.statTips && (key === character.class.statTips.primary || key === character.class.statTips.secondary);
                const isPri = character.class?.statTips?.primary === key;
                statsHtml += `<div class="bg-gray-900/80 p-4 rounded-xl border border-gray-700 ${isRec ? 'stat-recommended' : ''} ${isPri ? 'stat-primary' : ''} stat-block"><div class="flex items-center justify-between flex-wrap md:flex-nowrap gap-3"><div class="flex-1 min-w-0"><div class="font-bold text-amber-500 text-lg flex items-center gap-2 flex-wrap">${statNames[key]} ${isPri ? '<span class="text-xs bg-amber-600 text-black px-2 py-0.5 rounded font-bold">ГЛАВНАЯ</span>' : ''} ${isRec && !isPri ? '<span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded font-bold">ВАЖНО</span>' : ''}</div><div class="text-xs text-gray-500 mt-1">База: ${base} ${bonus > 0 ? `<span class="text-purple-400">+ ${bonus}</span> = <span class="text-amber-400">${final}</span>` : ''} • Стоимость: ${cost}</div></div><div class="flex items-center gap-3"><button class="stat-btn" onclick="changeStat('${key}', -1)" ${base <= 8 ? 'disabled' : ''}>−</button><span class="text-3xl font-bold w-12 text-center text-amber-400 stat-value">${final}</span><button class="stat-btn" onclick="changeStat('${key}', 1)" ${base >= 15 || pointsRemaining < (base >= 13 ? 2 : 1) ? 'disabled' : ''}>+</button></div><div class="w-24 text-right"><div class="text-xs text-gray-400">Мод</div><div class="text-2xl font-bold ${mod >= 0 ? 'text-green-400' : 'text-red-400'} stat-modifier">${modStr}</div></div></div></div>`;
            }
            container.innerHTML = `<h2 class="text-3xl font-bold text-amber-500 mb-4 fantasy-title">📊 Характеристики (Point Buy)</h2>${statTipsHtml}<div class="mb-6 text-center"><div class="points-counter text-lg">Осталось очков: ${pointsRemaining} / 27</div></div><div class="space-y-3">${statsHtml}</div>`;
        }
        function renderStep5(container) {
            const cs = spells[character.class.id]; if (!cs) return;
            const cHtml = cs.cantrips.map(s => `<div class="card p-4 rounded-xl ${character.spells.cantrips.includes(s.name) ? 'selected' : ''}" onclick="toggleSpell('cantrips', '${s.name}')"><div class="flex justify-between items-start"><div class="flex-1"><span class="spell-tag cantrip">Заговор</span><span class="font-bold text-lg text-amber-400">${s.name}</span><p class="text-xs text-gray-400 mt-2">${s.desc}</p></div>${character.spells.cantrips.includes(s.name) ? '<span class="text-amber-500 text-3xl">✓</span>' : ''}</div></div>`).join('');
            const lHtml = cs.level1.map(s => `<div class="card p-4 rounded-xl ${character.spells.level1.includes(s.name) ? 'selected' : ''}" onclick="toggleSpell('level1', '${s.name}')"><div class="flex justify-between items-start"><div class="flex-1"><span class="spell-tag level1">1-й уровень</span><span class="font-bold text-lg text-amber-400">${s.name}</span><p class="text-xs text-gray-400 mt-2">${s.desc}</p></div>${character.spells.level1.includes(s.name) ? '<span class="text-amber-500 text-3xl">✓</span>' : ''}</div></div>`).join('');
            container.innerHTML = `<h2 class="text-3xl font-bold text-amber-500 mb-4 fantasy-title">✨ Заклинания</h2><p class="text-sm text-gray-400 mb-6">Выбери <b class="text-amber-400">${character.class.cantrips} заговоров</b> и <b class="text-amber-400">${character.class.spells1} заклинаний</b>.</p>${cs.cantrips.length > 0 ? `<h3 class="text-xl font-bold text-purple-400 mb-3 mt-4">🔮 Заговоры (${character.spells.cantrips.length}/${character.class.cantrips})</h3><div class="space-y-3 mb-6">${cHtml}</div>` : ''}<h3 class="text-xl font-bold text-blue-400 mb-3"> 1-й уровень (${character.spells.level1.length}/${character.class.spells1})</h3><div class="space-y-3">${lHtml}</div>`;
        }

        function handleImageError(img, emoji, type) { img.style.display = 'none'; const p = document.createElement('div'); p.className = type === 'class' ? 'icon-placeholder' : 'race-icon-placeholder'; p.textContent = emoji; img.parentNode.insertBefore(p, img.nextSibling); }
        function selectRace(id) { character.race = races.find(r => r.id === id); render(); }
        function selectClass(id) { character.class = classes.find(c => c.id === id); character.spells = { cantrips: [], level1: [] }; render(); }
        function selectBackground(id) { character.background = backgrounds.find(b => b.id === id); render(); }
        function changeStat(stat, delta) { let newVal = character.stats[stat] + delta; if (newVal >= 8 && newVal <= 15) { let newUsed = getTotalPointsUsed() - getPointCost(character.stats[stat]) + getPointCost(newVal); if (newUsed <= 27) { character.stats[stat] = newVal; render(); } } }
        function toggleSpell(level, name) { const max = character.class[level === 'cantrips' ? 'cantrips' : 'spells1']; const arr = character.spells[level]; const idx = arr.indexOf(name); if (idx > -1) arr.splice(idx, 1); else if (arr.length < max) arr.push(name); else alert(`Максимум ${max}!`); render(); }
        function nextStep() {
            if (currentStep === 1 && !character.race) return alert('Выбери расу!');
            if (currentStep === 2 && !character.class) return alert('Выбери класс!');
            if (currentStep === 3 && !character.background) return alert('Выбери происхождение!');
            const max = character.class?.magic ? 5 : 4;
            if (currentStep === 4 && getPointsRemaining() > 0 && !confirm(`Осталось ${getPointsRemaining()} очков. Продолжить?`)) return;
            if (currentStep === 5) {
                if (character.spells.cantrips.length !== character.class.cantrips) return alert(`Выбери ${character.class.cantrips} заговоров!`);
                if (character.spells.level1.length !== character.class.spells1) return alert(`Выбери ${character.class.spells1} заклинаний!`);
            }
            if (currentStep < max) { currentStep++; render(); } else showFinalSheet();
        }
        function prevStep() { if (currentStep > 1) { currentStep--; render(); } }

        function showFinalSheet() {
            const container = document.getElementById('app-container');
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('btn-next').innerText = '🔄 Заново';
            document.getElementById('btn-next').onclick = () => location.reload();

            let dexMod = Math.floor((character.stats.dex + (character.race?.bonus.dex || 0) - 10) / 2);
            let conMod = Math.floor((character.stats.con + (character.race?.bonus.con || 0) - 10) / 2);
            let wisMod = Math.floor((character.stats.wis + (character.race?.bonus.wis || 0) - 10) / 2);
            let ac = 10 + dexMod;
            if (character.class.id === 'barbarian') ac = 10 + dexMod + conMod;
            if (character.class.id === 'monk') ac = 10 + dexMod + wisMod;
            let hp = character.class.hitDie + conMod;

            let statsList = '';
            for (let key in character.stats) {
                let final = character.stats[key] + (character.race ? (character.race.bonus[key] || 0) : 0);
                let mod = Math.floor((final - 10) / 2);
                statsList += `<div class="flex justify-between border-b border-gray-700 py-2"><span>${statNames[key]}</span> <span class="font-bold text-amber-400">${final} (${mod >= 0 ? '+' : ''}${mod})</span></div>`;
            }

            let spellsList = '';
            if (character.class?.magic && character.spells.cantrips.length > 0) {
                const cs = spells[character.class.id];
                spellsList = `<div class="mt-6 pt-6 border-t border-amber-600/30"><div class="font-bold text-purple-400 mb-3">✨ Заговоры:</div>${character.spells.cantrips.map(n => `<div class="desc-box"><b>${n}:</b> ${cs.cantrips.find(s=>s.name===n)?.desc}</div>`).join('')}<div class="font-bold text-blue-400 mb-3 mt-4"> 1-й уровень:</div>${character.spells.level1.map(n => `<div class="desc-box"><b>${n}:</b> ${cs.level1.find(s=>s.name===n)?.desc}</div>`).join('')}</div>`;
            }

            container.innerHTML = `
                <h2 class="text-4xl font-bold text-amber-500 mb-8 text-center fantasy-title"> Лист Персонажа</h2>
                <div class="bg-gray-900/90 p-6 md:p-8 rounded-2xl border-2 border-amber-600/50 shadow-2xl space-y-6">
                    <div class="text-center">
                        <input type="text" id="char-name" placeholder="Имя персонажа" value="${character.name}" class="bg-transparent text-2xl md:text-3xl font-bold text-center w-full border-b-2 border-amber-600/50 focus:border-amber-500 outline-none pb-2 fantasy-title text-amber-400" oninput="character.name = this.value; saveToLocalStorage();">
                        <div class="text-gray-300 mt-3">${character.race.name} • ${character.class.name} • ${character.background.name}</div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 text-center">
                        <div class="bg-gray-800/80 p-3 rounded-xl border border-amber-600/30"><div class="text-xs text-gray-400">🛡️ КД</div><div class="text-3xl font-bold text-amber-500">${ac}</div></div>
                        <div class="bg-gray-800/80 p-3 rounded-xl border border-amber-600/30"><div class="text-xs text-gray-400">⚡ Инициатива</div><div class="text-3xl font-bold ${dexMod >= 0 ? 'text-green-400' : 'text-red-400'}">${dexMod >= 0 ? '+' : ''}${dexMod}</div></div>
                        <div class="bg-gray-800/80 p-3 rounded-xl border border-amber-600/30"><div class="text-xs text-gray-400">❤️ Хиты</div><div class="text-3xl font-bold text-red-400">${hp}</div></div>
                        <div class="bg-gray-800/80 p-3 rounded-xl border border-amber-600/30"><div class="text-xs text-gray-400">👟 Скорость</div><div class="text-3xl font-bold text-blue-400">${character.race.speed} фт</div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-sm bg-gray-800/50 p-4 rounded-xl border border-gray-700">${statsList}</div>
                    <div class="text-sm space-y-2 border-t border-gray-700 pt-4"><div><span class="text-gray-400">Доспехи:</span> ${character.class.armor.join(', ') || 'Нет'}</div><div><span class="text-gray-400">Оружие:</span> ${character.class.weapons.join(', ')}</div><div><span class="text-gray-400">Спасброски:</span> ${character.class.saves.join(', ')}</div></div>
                    <div class="border-t border-gray-700 pt-4">${character.race.abilities.map(a => `<div class="desc-box"><b>${a.name}:</b> ${a.desc}</div>`).join('')}</div>
                    <div class="border-t border-gray-700 pt-4">${character.class.features.map(f => `<div class="desc-box"><b>${f.name}:</b> ${f.desc}</div>`).join('')}</div>
                    ${spellsList}
                    <div class="flex gap-4 mt-6 flex-col md:flex-row">
                        <button onclick="copyToDiscord()" class="flex-1 py-3 bg-gradient-to-r from-blue-600 to-blue-500 rounded-xl font-bold active:scale-95">📋 Discord</button>
                        <button onclick="generatePDF()" class="flex-1 py-3 bg-gradient-to-r from-green-600 to-green-500 rounded-xl font-bold active:scale-95"> Скачать PDF</button>
                    </div>
                </div>`;
        }

        function copyToDiscord() {
            let dexMod = Math.floor((character.stats.dex + (character.race?.bonus.dex || 0) - 10) / 2);
            let conMod = Math.floor((character.stats.con + (character.race?.bonus.con || 0) - 10) / 2);
            let ac = 10 + dexMod;
            if (character.class.id === 'barbarian') ac += conMod;
            if (character.class.id === 'monk') ac += Math.floor((character.stats.wis + (character.race?.bonus.wis || 0) - 10) / 2);
            let hp = character.class.hitDie + conMod;
            let text = `**${character.name || 'Безымянный'}** (${character.race.name} ${character.class.name})\n️КД:${ac} ❤️HP:${hp} ⚡Init:${dexMod}\n`;
            for (let k in character.stats) { let v = character.stats[k] + (character.race.bonus[k]||0); let m = Math.floor((v-10)/2); text += `${statNames[k]}:${v}(${m>=0?'+':''}${m}) `; }
            text += `\nЗаговоры:${character.spells.cantrips.join(', ')}\n1ур:${character.spells.level1.join(', ')}`;
            navigator.clipboard.writeText(text);
            const t = document.getElementById('copy-toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const sc = document.getElementById('sheet-content');
            const dexMod = Math.floor((character.stats.dex + (character.race?.bonus.dex || 0) - 10) / 2);
            const conMod = Math.floor((character.stats.con + (character.race?.bonus.con || 0) - 10) / 2);
            const ac = 10 + dexMod + (character.class.id === 'barbarian' ? conMod : 0) + (character.class.id === 'monk' ? Math.floor((character.stats.wis + (character.race?.bonus.wis || 0) - 10) / 2) : 0);
            const hp = character.class.hitDie + conMod;

            let statsHtml = '<div class="pdf-grid">';
            for (let key in character.stats) {
                let final = character.stats[key] + (character.race.bonus[key]||0);
                let mod = Math.floor((final-10)/2);
                statsHtml += `<div class="pdf-stat-box"><div class="pdf-stat-label">${statNames[key]}</div><div class="pdf-stat-value">${final}</div><div class="pdf-stat-mod">${mod>=0?'+':''}${mod}</div></div>`;
            }
            statsHtml += '</div>';

            let abilitiesHtml = character.race.abilities.map(a => `<div class="pdf-ability"><span class="pdf-ability-name">${a.name}:</span> ${a.desc}</div>`).join('');
            let featuresHtml = character.class.features.map(f => `<div class="pdf-ability"><span class="pdf-ability-name">${f.name}:</span> ${f.desc}</div>`).join('');
            
            let spellsHtml = '';
            if (character.class.magic && character.spells.cantrips.length > 0) {
                const cs = spells[character.class.id];
                spellsHtml = `<div class="pdf-section"><div class="pdf-section-title">✨ Заклинания</div><div><b>Заговоры:</b> ${character.spells.cantrips.join(', ')}</div><div><b>1-й уровень:</b> ${character.spells.level1.join(', ')}</div></div>`;
            }

            sc.innerHTML = `
                <div class="pdf-section" style="text-align: center; background: #fef3c7; border-color: #d97706;">
                    <div style="font-size: 20px; font-weight: bold; color: #d97706; margin-bottom: 5px;">${character.name || 'Безымянный герой'}</div>
                    <div style="color: #6b7280;">${character.race.name} ${character.class.name} • ${character.background.name}</div>
                </div>
                <div class="pdf-section">
                    <div class="pdf-section-title"> Характеристики</div>
                    ${statsHtml}
                </div>
                <div class="pdf-section">
                    <div class="pdf-section-title">⚔️ Боевые параметры</div>
                    <div class="pdf-grid">
                        <div class="pdf-stat-box"><div class="pdf-stat-label">🛡️ КД</div><div class="pdf-stat-value">${ac}</div></div>
                        <div class="pdf-stat-box"><div class="pdf-stat-label">❤️ Хиты</div><div class="pdf-stat-value">${hp}</div></div>
                        <div class="pdf-stat-box"><div class="pdf-stat-label">⚡ Инициатива</div><div class="pdf-stat-value">${dexMod>=0?'+':''}${dexMod}</div></div>
                        <div class="pdf-stat-box"><div class="pdf-stat-label">👟 Скорость</div><div class="pdf-stat-value">${character.race.speed} фт</div></div>
                    </div>
                </div>
                <div class="pdf-section">
                    <div class="pdf-section-title">🛡️ Владения</div>
                    <div class="pdf-info-row"><span class="pdf-info-label">Доспехи:</span> <span>${character.class.armor.join(', ') || 'Нет'}</span></div>
                    <div class="pdf-info-row"><span class="pdf-info-label">Оружие:</span> <span>${character.class.weapons.join(', ')}</span></div>
                    <div class="pdf-info-row"><span class="pdf-info-label">Спасброски:</span> <span>${character.class.saves.join(', ')}</span></div>
                </div>
                <div class="pdf-section">
                    <div class="pdf-section-title">🌟 Расовые способности</div>
                    ${abilitiesHtml}
                </div>
                <div class="pdf-section">
                    <div class="pdf-section-title">⚔️ Особенности класса</div>
                    ${featuresHtml}
                </div>
                ${spellsHtml}
            `;

            document.getElementById('pdf-date').textContent = new Date().toLocaleDateString('ru-RU');
            
            const el = document.getElementById('character-sheet');
            el.style.display = 'block';
            
            try {
                const canvas = await html2canvas(el, { 
                    scale: 2, 
                    useCORS: true, 
                    logging: false,
                    width: 800,
                    windowWidth: 800
                });
                
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                const imgWidth = canvas.width;
                const imgHeight = canvas.height;
                const ratio = Math.min(pdfWidth / imgWidth, pdfHeight / imgHeight);
                const imgX = (pdfWidth - imgWidth * ratio) / 2;
                const imgY = 10;
                
                pdf.addImage(imgData, 'PNG', imgX, imgY, imgWidth * ratio, imgHeight * ratio);
                pdf.save(`character-${character.name || 'unnamed'}.pdf`);
            } catch (error) {
                console.error('PDF Error:', error);
                alert('Ошибка при создании PDF. Попробуйте ещё раз.');
            } finally {
                el.style.display = 'none';
            }
        }

        function randomize() {
            character.race = races[Math.floor(Math.random() * races.length)];
            character.class = classes[Math.floor(Math.random() * classes.length)];
            character.background = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            let s = ['str','dex','con','int','wis','cha'], p = 27;
            s.forEach(k => character.stats[k] = 8);
            while (p > 0) { let k = s[Math.floor(Math.random()*s.length)]; if (character.stats[k] < 15) { let c = character.stats[k] >= 13 ? 2 : 1; if (p >= c) { character.stats[k]++; p -= c; } } }
            if (character.class.magic && spells[character.class.id]) {
                let cs = spells[character.class.id]; character.spells = { cantrips: [], level1: [] };
                let ac = [...cs.cantrips]; for (let i=0; i<character.class.cantrips && ac.length; i++) { let idx = Math.floor(Math.random()*ac.length); character.spells.cantrips.push(ac[idx].name); ac.splice(idx,1); }
                let al = [...cs.level1]; for (let i=0; i<character.class.spells1 && al.length; i++) { let idx = Math.floor(Math.random()*al.length); character.spells.level1.push(al[idx].name); al.splice(idx,1); }
            }
            currentStep = 1; render();
        }

        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = Math.random() > 0.5 ? '#f59e0b' : '#ef4444';
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.opacity -= 0.002;
                if (this.y < 0 || this.opacity <= 0) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        for(let i=0; i<50; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        loadFromLocalStorage();
        render();
    </script>
</body>
</html>
