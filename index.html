<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast D&D Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background-color: #0a0a0a; 
            color: #e2e8f0; 
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Фоновое изображение - ЛОКАЛЬНОЕ */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/bg/main-bg.jpg') center/cover;
            z-index: -2;
            filter: brightness(0.4);
        }

        /* Затемнение фона */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(10,10,20,0.8) 100%);
            z-index: -1;
        }

        /* Заголовки с готическим шрифтом */
        .fantasy-title {
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
        }

        /* Карточки с иконками */
        .card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 2px solid rgba(245, 158, 11, 0.2);
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .card:hover { 
            border-color: rgba(245, 158, 11, 0.6); 
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(245, 158, 11, 0.3);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card.selected { 
            border-color: rgba(245, 158, 11, 1); 
            background: rgba(39, 39, 42, 0.95);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.5), inset 0 0 20px rgba(245, 158, 11, 0.1);
            transform: translateY(-2px);
        }

        /* Иконки - ЛОКАЛЬНЫЕ */
        .class-icon {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid rgba(245, 158, 11, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .race-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(245, 158, 11, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        /* Placeholder для иконок */
        .icon-placeholder {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: black;
            border: 2px solid rgba(245, 158, 11, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .race-icon-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: black;
            border: 2px solid rgba(245, 158, 11, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-btn { 
            background: linear-gradient(135deg, #334155, #1e293b); 
            color: white; 
            width: 32px; 
            height: 32px; 
            border-radius: 4px; 
            font-weight: bold;
            border: 1px solid rgba(245, 158, 11, 0.3);
            transition: all 0.2s;
        }

        .stat-btn:hover:not(:disabled) { 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: black;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }

        .stat-btn:disabled { 
            opacity: 0.3; 
            cursor: not-allowed; 
        }

        .spell-tag { 
            display: inline-block; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 11px; 
            margin-right: 4px;
            font-weight: 600;
        }

        .spell-tag.cantrip { 
            background: linear-gradient(135deg, #7c3aed, #6d28d9); 
            color: white;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.4);
        }

        .spell-tag.level1 { 
            background: linear-gradient(135deg, #2563eb, #1d4ed8); 
            color: white;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4);
        }

        .copy-toast { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-weight: bold; 
            opacity: 0; 
            transition: opacity 0.3s; 
            pointer-events: none; 
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .copy-toast.show { 
            opacity: 1; 
        }

        .points-counter { 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: black; 
            padding: 8px 16px; 
            border-radius: 8px; 
            font-weight: bold; 
            display: inline-block;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .desc-box { 
            background: rgba(30, 41, 59, 0.8); 
            padding: 8px 12px; 
            border-radius: 6px; 
            margin: 4px 0; 
            font-size: 12px; 
            border-left: 3px solid #f59e0b;
            backdrop-filter: blur(5px);
        }

        .info-button { 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            padding: 10px 20px; 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            text-decoration: none; 
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .info-button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .stat-recommended { 
            border: 2px solid rgba(245, 158, 11, 0.8) !important; 
            background: linear-gradient(135deg, rgba(39, 39, 42, 0.9), rgba(51, 51, 61, 0.9)) !important;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3) !important;
        }

        .stat-primary { 
            border-left: 4px solid #f59e0b !important; 
        }

        .tip-banner { 
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.9), rgba(15, 23, 42, 0.9)); 
            border: 1px solid rgba(59, 130, 246, 0.5); 
            border-radius: 8px; 
            padding: 12px; 
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tip-primary { 
            color: #f59e0b; 
            font-weight: bold;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        .tip-secondary { 
            color: #60a5fa;
            font-weight: 600;
        }

        /* Анимация появления - ТОЛЬКО для первого рендера */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        /* Без анимации для шага характеристик */
        .no-animation {
            animation: none !important;
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        /* Стили для PDF генерации */
        #character-sheet {
            display: none;
            background: #f5f0e1;
            color: #1a1a1a;
            padding: 40px;
            font-family: 'Georgia', serif;
        }

        .sheet-header {
            border-bottom: 3px solid #8b4513;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .sheet-section {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 5px;
        }

        .sheet-title {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: #8b4513;
            margin-bottom: 15px;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 5px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="text-center mb-6 relative z-10 animate-fade-in">

        <p class="text-gray-300 mb-3 text-lg">Создай персонажа за 3 минуты • Шаг <span id="step-indicator" class="text-amber-400 font-bold">1</span> из <span id="total-steps" class="text-amber-400 font-bold">5</span></p>
        <div class="flex gap-3 justify-center">
            <button onclick="randomize()" class="px-6 py-2 bg-gradient-to-r from-purple-600 to-purple-500 hover:from-purple-500 hover:to-purple-400 rounded-lg font-bold text-sm transition shadow-lg hover:shadow-purple-500/50">🎲 Случайный персонаж</button>
            <button onclick="generatePDF()" id="pdf-btn" class="hidden px-6 py-2 bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 rounded-lg font-bold text-sm transition shadow-lg hover:shadow-green-500/50">📄 Скачать PDF лист</button>
        </div>
    </header>

        <button id="btn-next" onclick="nextStep()" class="px-8 py-3 bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-black rounded-lg font-bold transition shadow-lg hover:shadow-amber-500/50 border border-amber-400/50 ml-auto">Далее →</button>

                level1: [

                    { name: 'Создание или уничтожение воды', desc: 'Создаёшь 10 галлонов воды или уничтожаешь' },
                    { name: 'Фаэри файр', desc: 'Подсвечиваешь существ: атаки по ним с преимуществом' },

                    { name: 'Долгий шаг', desc: '+10 фт скорости' },
                    { name: 'Разговор с животными', desc: 'Общаешься с животными' },
                    { name: 'Обнаружение магии', desc: 'Чувствуешь магию' }
                ]
            }
        };

        // === СОСТОЯНИЕ ===
        let currentStep = 1;
        let character = {
            name: '',
            race: null,
            class: null,
            background: null,
            stats: { str: 8, dex: 8, con: 8, int: 8, wis: 8, cha: 8 },
            spells: { cantrips: [], level1: [] },
            skills: []
        };

        const statNames = { str: 'Сила', dex: 'Ловкость', con: 'Телосложение', int: 'Интеллект', wis: 'Мудрость', cha: 'Харизма' };
        const statKeys = ['str', 'dex', 'con', 'int', 'wis', 'cha'];

        // === POINT BUY СИСТЕМА ===
        function getPointCost(value) {
            if (value <= 13) return value - 8;
            if (value === 14) return 7;
            if (value === 15) return 9;
            return 0;
        }

        function getTotalPointsUsed() {
            let total = 0;
            for (let key in character.stats) {
                total += getPointCost(character.stats[key]);
            }
            return total;
        }

        function getPointsRemaining() {
            return 27 - getTotalPointsUsed();
        }

        // === НАВИГАЦИЯ ===
        function getTotalSteps() {
            return character.class?.magic ? 5 : 4;
        }

        function getCurrentDisplayStep() {
            if (!character.class?.magic && currentStep >= 5) return currentStep - 1;
            return currentStep;
        }

        function render() {
            document.getElementById('step-indicator').innerText = getCurrentDisplayStep();
            document.getElementById('total-steps').innerText = getTotalSteps();
            const container = document.getElementById('app-container');
            const btnBack = document.getElementById('btn-back');
            const btnNext = document.getElementById('btn-next');

            btnBack.classList.toggle('hidden', currentStep === 1);
            btnNext.innerText = currentStep === (character.class?.magic ? 5 : 4) ? '✅ Завершить' : 'Далее →';

            if (currentStep === 1) renderStep1(container);
            else if (currentStep === 2) renderStep2(container);
            else if (currentStep === 3) renderStep3(container);
            else if (currentStep === 4) renderStep4(container);
            else if (currentStep === 5) renderStep5(container);
        }

        function renderStep1(container) {
            container.innerHTML = `
                <h2 class="text-3xl font-bold text-amber-500 mb-6 fantasy-title animate-fade-in">🌟 Шаг 1: Выбери расу</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    ${races.map(r => `
                        <div class="card p-5 rounded-xl ${character.race?.id === r.id ? 'selected' : ''} animate-fade-in" onclick="selectRace('${r.id}')">
                            <div class="flex items-center gap-4 mb-3">
                                <img src="${raceIcons[r.id]}" alt="${r.name}" class="race-icon" onerror="handleImageError(this, '${raceEmojis[r.id]}', 'race')">
                                <div>
                                    <h3 class="text-xl font-bold text-amber-400">${r.name}</h3>
                                    <p class="text-xs text-blue-400">Скорость: ${r.speed} фт</p>
                                </div>
                            </div>
                            <p class="text-sm text-gray-300 mb-3">${r.desc}</p>
                            <div class="text-xs space-y-1">
                                ${r.abilities.map(a => `<div class="text-purple-300">• ${a.name}</div>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderStep2(container) {
            container.innerHTML = `
                <h2 class="text-3xl font-bold text-amber-500 mb-6 fantasy-title animate-fade-in">⚔️ Шаг 2: Выбери класс</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${classes.map(c => `
                        <div class="card p-5 rounded-xl ${character.class?.id === c.id ? 'selected' : ''} animate-fade-in" onclick="selectClass('${c.id}')">
                            <div class="flex items-center gap-4 mb-3">
                                <img src="${classIcons[c.id]}" alt="${c.name}" class="class-icon" onerror="handleImageError(this, '${classEmojis[c.id]}', 'class')">
                                <div class="flex-1">
                                    <div class="flex justify-between items-center">
                                        <h3 class="text-xl font-bold text-amber-400">${c.name}</h3>
                                        <span class="text-xs ${c.magic ? 'bg-purple-600' : 'bg-gray-600'} px-2 py-1 rounded font-bold">${c.magic ? '✨ Маг' : '⚔️ Воин'}</span>
                                    </div>
                                    <p class="text-xs text-gray-400 mt-1">Кость хитов: <b class="text-amber-500">d${c.hitDie}</b></p>
                                </div>
                            </div>
                            <p class="text-sm text-gray-300 mb-2">${c.desc}</p>
                            <div class="text-xs text-gray-400 mb-2">
                                Главная характеристика: <b class="text-amber-500">${c.primary}</b>
                            </div>
                            ${c.magic ? `<div class="text-xs text-purple-400">✨ ${c.cantrips} заговоров + ${c.spells1} заклинаний 1-го уровня</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderStep3(container) {
            container.innerHTML = `
                <h2 class="text-3xl font-bold text-amber-500 mb-6 fantasy-title animate-fade-in">📜 Шаг 3: Выбери происхождение</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${backgrounds.map(b => `
                        <div class="card p-5 rounded-xl ${character.background?.id === b.id ? 'selected' : ''} animate-fade-in" onclick="selectBackground('${b.id}')">
                            <h3 class="text-xl font-bold text-amber-400 mb-2">${b.name}</h3>
                            <p class="text-sm text-gray-300 mb-3">${b.desc}</p>
                            <div class="text-sm">
                                <span class="text-gray-400">Навыки:</span> <b class="text-amber-500">${b.skills.join(', ')}</b>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderStep4(container) {
            let pointsUsed = getTotalPointsUsed();
            let pointsRemaining = getPointsRemaining();
            
            // Подсказки по статам для класса
            let statTipsHtml = '';
            if (character.class?.statTips) {
                const tips = character.class.statTips;
                const primaryName = statNames[tips.primary];
                const secondaryName = statNames[tips.secondary];
                statTipsHtml = `
                    <div class="tip-banner">
                        <div class="text-sm">
                            <span class="tip-primary">🎯 Главная:</span> ${primaryName} — для атак и заклинаний • 
                            <span class="tip-secondary">⚡ Вторичная:</span> ${secondaryName}
                            <div class="text-xs text-gray-400 mt-1">${tips.tip}</div>
                        </div>
                    </div>
                `;
            } else {
                statTipsHtml = `
                    <div class="tip-banner">
                        <div class="text-sm text-gray-300">
                            💡 <b>Совет:</b> Сначала выбери класс, чтобы увидеть рекомендации по характеристикам.
                        </div>
                    </div>
                `;
            }

            let statsHtml = '';
            for (let key of statKeys) {
                let base = character.stats[key];
                let bonus = character.race ? (character.race.bonus[key] || 0) : 0;
                let final = base + bonus;
                let mod = Math.floor((final - 10) / 2);
                let modStr = mod >= 0 ? `+${mod}` : mod;
                let cost = getPointCost(base);
                
                // Подсветка рекомендуемых статов
                const isRecommended = character.class?.statTips && (key === character.class.statTips.primary || key === character.class.statTips.secondary);
                const isPrimary = character.class?.statTips?.primary === key;
                const cardClass = isRecommended ? 'stat-recommended' : '';
                const borderClass = isPrimary ? 'stat-primary' : '';

                statsHtml += `
                    <div class="bg-gray-900/80 p-4 rounded-xl border border-gray-700 ${cardClass} ${borderClass}">
                        <div class="flex items-center justify-between">
                            <div class="flex-1">
                                <div class="font-bold text-amber-500 text-lg flex items-center gap-2">
                                    ${statNames[key]}
                                    ${isPrimary ? '<span class="text-xs bg-amber-600 text-black px-2 py-0.5 rounded font-bold">ГЛАВНАЯ</span>' : ''}
                                    ${isRecommended && !isPrimary ? '<span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded font-bold">ВАЖНО</span>' : ''}
                                </div>
                                <div class="text-xs text-gray-500 mt-1">База: ${base} ${bonus > 0 ? `<span class="text-purple-400">+ ${bonus} (раса)</span> = <span class="text-amber-400">${final}</span>` : ''} • Стоимость: ${cost} очк.</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button class="stat-btn" onclick="changeStat('${key}', -1)" ${base <= 8 ? 'disabled' : ''}>−</button>
                                <span class="text-3xl font-bold w-12 text-center text-amber-400">${final}</span>
                                <button class="stat-btn" onclick="changeStat('${key}', 1)" ${base >= 15 || pointsRemaining < (base >= 13 ? 2 : 1) ? 'disabled' : ''}>+</button>
                            </div>
                            <div class="w-24 text-right">
                                <div class="text-xs text-gray-400">Модификатор</div>
                                <div class="text-2xl font-bold ${mod >= 0 ? 'text-green-400' : 'text-red-400'}">${modStr}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = `
                <h2 class="text-3xl font-bold text-amber-500 mb-4 fantasy-title">📊 Шаг 4: Характеристики (Point Buy)</h2>
                ${statTipsHtml}
                <div class="mb-6 text-center">
                    <div class="points-counter text-lg">Осталось очков: ${pointsRemaining} / 27</div>
                    <p class="text-xs text-gray-400 mt-2">Старт: 8 во всех. Стоимость 8→13 = 1 очко/пункт, 14→15 = 2 очка/пункт</p>
                </div>
                <div class="space-y-3">${statsHtml}</div>
            `;
        }

        function renderStep5(container) {
            const classSpells = spells[character.class.id];
            if (!classSpells) {
                container.innerHTML = `<p class="text-gray-400">Заклинания для этого класса пока не добавлены.</p>`;
                return;
            }

            const cantripsHtml = classSpells.cantrips.map(s => `
                <div class="card p-4 rounded-xl ${character.spells.cantrips.includes(s.name) ? 'selected' : ''}" onclick="toggleSpell('cantrips', '${s.name}')">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <span class="spell-tag cantrip">Заговор</span>
                            <span class="font-bold text-lg text-amber-400">${s.name}</span>
                            <p class="text-xs text-gray-400 mt-2">${s.desc}</p>
                        </div>
                        ${character.spells.cantrips.includes(s.name) ? '<span class="text-amber-500 text-3xl">✓</span>' : ''}
                    </div>
                </div>
            `).join('');

            const level1Html = classSpells.level1.map(s => `
                <div class="card p-4 rounded-xl ${character.spells.level1.includes(s.name) ? 'selected' : ''}" onclick="toggleSpell('level1', '${s.name}')">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <span class="spell-tag level1">1-й уровень</span>
                            <span class="font-bold text-lg text-amber-400">${s.name}</span>
                            <p class="text-xs text-gray-400 mt-2">${s.desc}</p>
                        </div>
                        ${character.spells.level1.includes(s.name) ? '<span class="text-amber-500 text-3xl">✓</span>' : ''}
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <h2 class="text-3xl font-bold text-amber-500 mb-4 fantasy-title">✨ Шаг 5: Заклинания (${character.class.name})</h2>
                <p class="text-sm text-gray-400 mb-6">Выбери <b class="text-amber-400">${character.class.cantrips} заговоров</b> и <b class="text-amber-400">${character.class.spells1} заклинаний 1-го уровня</b>.</p>
                
                ${classSpells.cantrips.length > 0 ? `
                    <h3 class="text-xl font-bold text-purple-400 mb-3 mt-4">🔮 Заговоры (${character.spells.cantrips.length}/${character.class.cantrips})</h3>
                    <div class="space-y-3 mb-6">${cantripsHtml}</div>
                ` : '<p class="text-gray-500 italic mb-4">Этот класс не имеет заговоров.</p>'}
                
                <h3 class="text-xl font-bold text-blue-400 mb-3">📜 Заклинания 1-го уровня (${character.spells.level1.length}/${character.class.spells1})</h3>
                <div class="space-y-3">${level1Html}</div>
            `;
        }

        // === ДЕЙСТВИЯ ===
        function selectRace(id) { character.race = races.find(r => r.id === id); render(); }
        function selectClass(id) { 
            character.class = classes.find(c => c.id === id); 
            character.spells = { cantrips: [], level1: [] };
            character.skills = [];
            render(); 
        }
        function selectBackground(id) { character.background = backgrounds.find(b => b.id === id); render(); }

        function changeStat(stat, delta) {
            let newVal = character.stats[stat] + delta;
            if (newVal >= 8 && newVal <= 15) {
                let newPointsUsed = getTotalPointsUsed() - getPointCost(character.stats[stat]) + getPointCost(newVal);
                if (newPointsUsed <= 27) {
                    character.stats[stat] = newVal;
                    render();
                }
            }
        }

        function toggleSpell(level, spellName) {
            const max = character.class[level === 'cantrips' ? 'cantrips' : 'spells1'];
            const arr = character.spells[level];
            const idx = arr.indexOf(spellName);
            if (idx > -1) {
                arr.splice(idx, 1);
            } else if (arr.length < max) {
                arr.push(spellName);
            } else {
                alert(`Максимум ${max} заклинаний этого типа!`);
            }
            render();
        }

        function nextStep() {
            if (currentStep === 1 && !character.race) return alert('Сначала выбери расу!');
            if (currentStep === 2 && !character.class) return alert('Сначала выбери класс!');
            if (currentStep === 3 && !character.background) return alert('Сначала выбери происхождение!');
            
            const maxStep = character.class?.magic ? 5 : 4;
            
            if (currentStep === 4 && getPointsRemaining() > 0) {
                if (!confirm(`У тебя осталось ${getPointsRemaining()} очков. Использовать не все очки?`)) return;
            }
            
            if (currentStep === 5) {
                if (character.spells.cantrips.length !== character.class.cantrips) return alert(`Выбери ровно ${character.class.cantrips} заговоров!`);
                if (character.spells.level1.length !== character.class.spells1) return alert(`Выбери ровно ${character.class.spells1} заклинаний 1-го уровня!`);
            }
            
            if (currentStep < maxStep) {
                currentStep++;
                render();
            } else {
                showFinalSheet();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                render();
            }
        }

        function showFinalSheet() {
            const container = document.getElementById('app-container');
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('pdf-btn').classList.remove('hidden');
            document.getElementById('btn-next').innerText = '🔄 Начать заново';
            document.getElementById('btn-next').onclick = () => location.reload();

            let statsList = '';
            for (let key in character.stats) {
                let final = character.stats[key] + (character.race ? (character.race.bonus[key] || 0) : 0);
                let mod = Math.floor((final - 10) / 2);
                let modStr = mod >= 0 ? `+${mod}` : mod;
                statsList += `<div class="flex justify-between border-b border-gray-700 py-2"><span>${statNames[key]}</span> <span class="font-bold text-amber-400">${final} (<span class="${mod >= 0 ? 'text-green-400' : 'text-red-400'}">${modStr}</span>)</span></div>`;
            }

            // Расчёт КД, инициативы, хитов, скорости
            let dexMod = Math.floor((character.stats.dex + (character.race?.bonus.dex || 0) - 10) / 2);
            let conMod = Math.floor((character.stats.con + (character.race?.bonus.con || 0) - 10) / 2);
            let wisMod = Math.floor((character.stats.wis + (character.race?.bonus.wis || 0) - 10) / 2);

            let ac = 10 + dexMod;
            if (character.class.id === 'barbarian') ac = 10 + dexMod + conMod;
            if (character.class.id === 'monk') ac = 10 + dexMod + wisMod;

            let initiative = dexMod;
            let hp = character.class.hitDie + conMod;
            let speed = character.race.speed;

            let spellsList = '';
            if (character.class?.magic && character.spells.cantrips.length > 0) {
                const classSpells = spells[character.class.id];
                let cantripsDesc = character.spells.cantrips.map(spellName => {
                    const spell = classSpells.cantrips.find(s => s.name === spellName);
                    return spell ? `<div class="desc-box"><b class="text-purple-400">${spell.name}:</b> ${spell.desc}</div>` : '';
                }).join('');
                
                let level1Desc = character.spells.level1.map(spellName => {
                    const spell = classSpells.level1.find(s => s.name === spellName);
                    return spell ? `<div class="desc-box"><b class="text-blue-400">${spell.name}:</b> ${spell.desc}</div>` : '';
                }).join('');
                
                spellsList = `
                    <div class="mt-6 pt-6 border-t border-amber-600/30">
                        <div class="font-bold text-purple-400 mb-3 text-lg">✨ Заговоры:</div>
                        ${cantripsDesc}
                        <div class="font-bold text-blue-400 mb-3 mt-4 text-lg">📜 Заклинания 1-го уровня:</div>
                        ${level1Desc}
                    </div>
                `;
            }

            // Владения
            let proficienciesHtml = `
                <div class="mt-6 pt-6 border-t border-amber-600/30">
                    <div class="font-bold text-amber-400 mb-3 text-lg">🛡️ Владения:</div>
                    <div class="text-sm space-y-2">
                        <div><span class="text-gray-400">Доспехи:</span> <span class="text-gray-300">${character.class.armor.length > 0 ? character.class.armor.join(', ') : 'Нет'}</span></div>
                        <div><span class="text-gray-400">Оружие:</span> <span class="text-gray-300">${character.class.weapons.join(', ')}</span></div>
                        ${character.class.tools.length > 0 ? `<div><span class="text-gray-400">Инструменты:</span> <span class="text-gray-300">${character.class.tools.join(', ')}</span></div>` : ''}
                        <div><span class="text-gray-400">Спасброски:</span> <span class="text-gray-300">${character.class.saves.join(', ')}</span></div>
                        <div><span class="text-gray-400">Навыки:</span> <span class="text-gray-300">${character.class.skills.length > 0 ? character.class.skills.join(', ') : 'Нет'} (выбрать ${character.class.skillsCount})</span></div>
                    </div>
                </div>
            `;

            // Расовые способности с описаниями
            let racialAbilitiesHtml = `
                <div class="mt-6 pt-6 border-t border-amber-600/30">
                    <div class="font-bold text-purple-400 mb-3 text-lg">🌟 Расовые способности:</div>
                    ${character.race.abilities.map(a => `
                        <div class="desc-box"><b class="text-purple-400">${a.name}:</b> <span class="text-gray-300">${a.desc}</span></div>
                    `).join('')}
                </div>
            `;

            // Особенности класса с описаниями
            let classFeaturesHtml = `
                <div class="mt-6 pt-6 border-t border-amber-600/30">
                    <div class="font-bold text-amber-400 mb-3 text-lg">⚔️ Особенности класса:</div>
                    ${character.class.features.map(f => `
                        <div class="desc-box"><b class="text-amber-400">${f.name}:</b> <span class="text-gray-300">${f.desc}</span></div>
                    `).join('')}
                </div>
            `;

            container.innerHTML = `
                <h2 class="text-4xl font-bold text-amber-500 mb-8 text-center fantasy-title animate-fade-in">📜 Лист Персонажа</h2>
                <div class="bg-gray-900/90 p-8 rounded-2xl border-2 border-amber-600/50 shadow-2xl space-y-6">
                    <div class="text-center mb-6">
                        <input type="text" id="char-name" placeholder="Введи имя персонажа" value="${character.name}" 
                            class="bg-transparent text-3xl font-bold text-center w-full border-b-2 border-amber-600/50 focus:border-amber-500 outline-none pb-2 fantasy-title text-amber-400"
                            oninput="character.name = this.value">
                        <div class="text-gray-300 mt-3 text-lg">${character.race.name} • ${character.class.name} • ${character.background.name}</div>
                        <div class="text-sm text-gray-500 mt-1">Кость хитов: <b class="text-amber-500">d${character.class.hitDie}</b> • Главная хар-ка: <b class="text-amber-500">${character.class.primary}</b></div>
                    </div>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center mb-6">
                        <div class="bg-gray-800/80 p-4 rounded-xl border border-amber-600/30">
                            <div class="text-xs text-gray-400 mb-2">🛡️ Класс Доспеха</div>
                            <div class="text-4xl font-bold text-amber-500 fantasy-title">${ac}</div>
                        </div>
                        <div class="bg-gray-800/80 p-4 rounded-xl border border-amber-600/30">
                            <div class="text-xs text-gray-400 mb-2">⚡ Инициатива</div>
                            <div class="text-4xl font-bold ${initiative >= 0 ? 'text-green-400' : 'text-red-400'} fantasy-title">${initiative >= 0 ? '+' : ''}${initiative}</div>
                        </div>
                        <div class="bg-gray-800/80 p-4 rounded-xl border border-amber-600/30">
                            <div class="text-xs text-gray-400 mb-2">❤️ Хиты (HP)</div>
                            <div class="text-4xl font-bold text-red-400 fantasy-title">${hp}</div>
                        </div>
                        <div class="bg-gray-800/80 p-4 rounded-xl border border-amber-600/30">
                            <div class="text-xs text-gray-400 mb-2">👟 Скорость</div>
                            <div class="text-4xl font-bold text-blue-400 fantasy-title">${speed} <span class="text-lg">фт</span></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm bg-gray-800/50 p-6 rounded-xl border border-gray-700">${statsList}</div>
                    
                    ${proficienciesHtml}
                    ${racialAbilitiesHtml}
                    ${classFeaturesHtml}
                    ${spellsList}
                    
                    <div class="mt-8 text-center">
                        <a href="https://5e14.ttg.club/" target="_blank" class="info-button text-lg px-8 py-3">
                            📚 Подробная информация о правилах и способностях
                        </a>
                        <p class="text-xs text-gray-500 mt-3">Перейдите на сайт для детального изучения всех правил D&D 5e</p>
                    </div>
                    
                    <div class="flex gap-4 mt-6">
                        <button onclick="copyToDiscord()" class="flex-1 py-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 rounded-xl font-bold text-lg transition shadow-lg hover:shadow-blue-500/50 border border-blue-400/50">📋 Скопировать для Discord</button>
                        <button onclick="generatePDF()" class="flex-1 py-4 bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 rounded-xl font-bold text-lg transition shadow-lg hover:shadow-green-500/50 border border-green-400/50">📄 Скачать PDF лист</button>
                    </div>
                </div>
            `;
        }

        function copyToDiscord() {
            let dexMod = Math.floor((character.stats.dex + (character.race?.bonus.dex || 0) - 10) / 2);
            let conMod = Math.floor((character.stats.con + (character.race?.bonus.con || 0) - 10) / 2);
            let wisMod = Math.floor((character.stats.wis + (character.race?.bonus.wis || 0) - 10) / 2);

            let ac = 10 + dexMod;
            if (character.class.id === 'barbarian') ac = 10 + dexMod + conMod;
            if (character.class.id === 'monk') ac = 10 + dexMod + wisMod;

            let initiative = dexMod;
            let hp = character.class.hitDie + conMod;
            let speed = character.race.speed;

            let text = `**📜 ${character.name || 'Безымянный герой'}**\n`;
            text += `*${character.race.name} ${character.class.name} (${character.background.name})*\n\n`;
            text += `**🛡️ КД:** ${ac} | **⚡ Инициатива:** ${initiative >= 0 ? '+' : ''}${initiative} | **❤️ Хиты:** ${hp} | **👟 Скорость:** ${speed} фт\n\n`;
            text += `**Характеристики:**\n`;
            for (let key in character.stats) {
                let final = character.stats[key] + (character.race.bonus[key] || 0);
                let mod = Math.floor((final - 10) / 2);
                let modStr = mod >= 0 ? `+${mod}` : mod;
                text += `${statNames[key]}: ${final} (${modStr})\n`;
            }
            
            text += `\n**🛡️ Владения:**\n`;
            text += `Доспехи: ${character.class.armor.join(', ') || 'Нет'}\n`;
            text += `Оружие: ${character.class.weapons.join(', ')}\n`;
            if (character.class.tools.length > 0) text += `Инструменты: ${character.class.tools.join(', ')}\n`;
            text += `Спасброски: ${character.class.saves.join(', ')}\n`;
            
            text += `\n**🌟 Расовые способности:**\n${character.race.abilities.map(a => `• ${a.name}: ${a.desc}`).join('\n')}\n`;
            text += `\n**⚔️ Особенности класса:**\n${character.class.features.map(f => `• ${f.name}: ${f.desc}`).join('\n')}\n`;
            
            if (character.class.magic) {
                text += `\n**✨ Заговоры:** ${character.spells.cantrips.join(', ') || 'нет'}`;
                text += `\n**📜 Заклинания 1-го уровня:** ${character.spells.level1.join(', ') || 'нет'}`;
            }
            
            text += `\n\n📚 Подробная информация: https://5e14.ttg.club/`;
            
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // === ГЕНЕРАЦИЯ PDF ЛИСТА ПЕРСОНАЖА ===
        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            
            // Создаём содержимое для PDF
            const sheetContent = document.getElementById('sheet-content');
            sheetContent.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h2 style="font-size: 28px; color: #8b4513; margin: 0;">${character.name || 'Безымянный герой'}</h2>
                    <p style="font-size: 16px; color: #666;">${character.race.name} ${character.class.name} • ${character.background.name}</p>
                </div>
                
                <div class="sheet-section">
                    <h3 style="font-size: 20px; color: #8b4513; margin-bottom: 10px;">Характеристики</h3>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                        ${Object.entries(character.stats).map(([key, value]) => {
                            const final = value + (character.race.bonus[key] || 0);
                            const mod = Math.floor((final - 10) / 2);
                            const modStr = mod >= 0 ? `+${mod}` : mod;
                            return `
                                <div style="background: white; padding: 10px; border-radius: 5px; text-align: center;">
                                    <div style="font-weight: bold; color: #8b4513;">${statNames[key]}</div>
                                    <div style="font-size: 24px; margin: 5px 0;">${final}</div>
                                    <div style="color: ${mod >= 0 ? '#22c55e' : '#ef4444'};">${modStr}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                
                <div class="sheet-section">
                    <h3 style="font-size: 20px; color: #8b4513; margin-bottom: 10px;">Боевые параметры</h3>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                        <div style="background: white; padding: 10px; border-radius: 5px; text-align: center;">
                            <div style="font-size: 12px; color: #666;">КД</div>
                            <div style="font-size: 24px; font-weight: bold; color: #8b4513;">${10 + Math.floor((character.stats.dex + (character.race.bonus.dex || 0) - 10) / 2)}</div>
                        </div>
                        <div style="background: white; padding: 10px; border-radius: 5px; text-align: center;">
                            <div style="font-size: 12px; color: #666;">Хиты</div>
                            <div style="font-size: 24px; font-weight: bold; color: #dc2626;">${character.class.hitDie + Math.floor((character.stats.con + (character.race.bonus.con || 0) - 10) / 2)}</div>
                        </div>
                        <div style="background: white; padding: 10px; border-radius: 5px; text-align: center;">
                            <div style="font-size: 12px; color: #666;">Инициатива</div>
                            <div style="font-size: 24px; font-weight: bold;">${Math.floor((character.stats.dex + (character.race.bonus.dex || 0) - 10) / 2) >= 0 ? '+' : ''}${Math.floor((character.stats.dex + (character.race.bonus.dex || 0) - 10) / 2)}</div>
                        </div>
                        <div style="background: white; padding: 10px; border-radius: 5px; text-align: center;">
                            <div style="font-size: 12px; color: #666;">Скорость</div>
                            <div style="font-size: 24px; font-weight: bold; color: #2563eb;">${character.race.speed} фт</div>
                        </div>
                    </div>
                </div>
                
                <div class="sheet-section">
                    <h3 style="font-size: 20px; color: #8b4513; margin-bottom: 10px;">Расовые способности</h3>
                    <ul style="list-style: none; padding: 0;">
                        ${character.race.abilities.map(a => `<li style="padding: 5px 0; border-bottom: 1px solid #ddd;"><b>${a.name}:</b> ${a.desc}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="sheet-section">
                    <h3 style="font-size: 20px; color: #8b4513; margin-bottom: 10px;">Особенности класса</h3>
                    <ul style="list-style: none; padding: 0;">
                        ${character.class.features.map(f => `<li style="padding: 5px 0; border-bottom: 1px solid #ddd;"><b>${f.name}:</b> ${f.desc}</li>`).join('')}
                    </ul>
                </div>
                
                ${character.class.magic && character.spells.cantrips.length > 0 ? `
                <div class="sheet-section">
                    <h3 style="font-size: 20px; color: #8b4513; margin-bottom: 10px;">Заклинания</h3>
                    <div style="margin-bottom: 10px;">
                        <b style="color: #7c3aed;">Заговоры:</b> ${character.spells.cantrips.join(', ')}
                    </div>
                    <div>
                        <b style="color: #2563eb;">1-й уровень:</b> ${character.spells.level1.join(', ')}
                    </div>
                </div>
                ` : ''}
                
                <div class="sheet-section">
                    <h3 style="font-size: 20px; color: #8b4513; margin-bottom: 10px;">Владения</h3>
                    <div style="margin-bottom: 5px;"><b>Доспехи:</b> ${character.class.armor.join(', ') || 'Нет'}</div>
                    <div style="margin-bottom: 5px;"><b>Оружие:</b> ${character.class.weapons.join(', ')}</div>
                    ${character.class.tools.length > 0 ? `<div style="margin-bottom: 5px;"><b>Инструменты:</b> ${character.class.tools.join(', ')}</div>` : ''}
                    <div><b>Спасброски:</b> ${character.class.saves.join(', ')}</div>
                </div>
                
                <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 2px solid #8b4513; color: #999; font-size: 12px;">
                    Создано в Fast D&D Builder • ${new Date().toLocaleDateString('ru-RU')}
                </div>
            `;
            
            // Генерируем PDF
            const pdf = new jsPDF('p', 'mm', 'a4');
            const element = document.getElementById('character-sheet');
            element.style.display = 'block';
            
            await html2canvas(element, {
                scale: 2,
                useCORS: true,
                logging: false
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                pdf.save(`character-${character.name || 'unnamed'}.pdf`);
                element.style.display = 'none';
            });
        }

        // === РАНДОМАЙЗЕР ===
        function randomize() {
            character.race = races[Math.floor(Math.random() * races.length)];
            character.class = classes[Math.floor(Math.random() * classes.length)];
            character.background = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            
            let stats = ['str', 'dex', 'con', 'int', 'wis', 'cha'];
            let pointsLeft = 27;
            stats.forEach(s => character.stats[s] = 8);
            
            while (pointsLeft > 0) {
                let stat = stats[Math.floor(Math.random() * stats.length)];
                let currentVal = character.stats[stat];
                if (currentVal < 15) {
                    let cost = currentVal >= 13 ? 2 : 1;
                    if (pointsLeft >= cost) {
                        character.stats[stat]++;
                        pointsLeft -= cost;
                    }
                }
            }
            
            if (character.class.magic && spells[character.class.id]) {
                let classSpells = spells[character.class.id];
                character.spells.cantrips = [];
                character.spells.level1 = [];
                
                let availableCantrips = [...classSpells.cantrips];
                for (let i = 0; i < character.class.cantrips && availableCantrips.length > 0; i++) {
                    let idx = Math.floor(Math.random() * availableCantrips.length);
                    character.spells.cantrips.push(availableCantrips[idx].name);
                    availableCantrips.splice(idx, 1);
                }
                
                let availableLevel1 = [...classSpells.level1];
                for (let i = 0; i < character.class.spells1 && availableLevel1.length > 0; i++) {
                    let idx = Math.floor(Math.random() * availableLevel1.length);
                    character.spells.level1.push(availableLevel1[idx].name);
                    availableLevel1.splice(idx, 1);
                }
            }
            
            currentStep = 1;
            render();
            alert('🎲 Случайный персонаж создан! Перейди на последний шаг, чтобы увидеть результат.');
        }

        render();
    </script>
</body>
