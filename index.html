<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор персонажа D&D 5e</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #a07820;
  --gold-light: #c49a2a;
  --gold-dim: #7a5c14;
  --bg-page: #f5f0e8;
  --bg-panel: #ede7da;
  --bg-card: #faf7f2;
  --bg-card-hover: #f0eadc;
  --bg-card-sel: #fdf3d8;
  --border: rgba(120,90,30,0.18);
  --border-strong: rgba(120,90,30,0.45);
  --text-primary: #2a1f0e;
  --text-secondary: #6b5030;
  --text-muted: #9c7d50;
  --font-display: Georgia, serif;
  --font-body: Georgia, serif;
  --font-ui: "Segoe UI", system-ui, sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 2px 12px rgba(80,50,10,0.12);
}
.page-bg{position:fixed;inset:0;z-index:0;background:url('images/bg/main-bg.jpg') center/cover no-repeat;filter:brightness(0.55) saturate(0.85);}
#app{position:relative;z-index:1;}
html, body { min-height:100vh; background:var(--bg-page); color:var(--text-primary); font-family:var(--font-body); font-size:16px; line-height:1.6; }

/* HEADER */
.site-header { background:#2a1f0e; color:#f5f0e8; text-align:center; padding:1.5rem 1rem 1.25rem; border-bottom:3px solid var(--gold); }
.site-header h1 { font-size:clamp(1.3rem,4vw,2rem); font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gold-light); margin-bottom:.2rem; }
.site-header p { font-size:.9rem; color:#c4a878; font-style:italic; }

/* PROGRESS */
.progress-wrap { background:rgba(245,240,232,0.96); border-bottom:1px solid var(--border); padding:.75rem 1.25rem 0; }
.progress-steps { display:flex; align-items:center; gap:3px; overflow-x:auto; padding-bottom:.6rem; scrollbar-width:none; }
.progress-steps::-webkit-scrollbar { display:none; }
.ps-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex-shrink:0; padding:0 4px; opacity:.4; transition:opacity .2s; }
.ps-item.done, .ps-item.active { opacity:1; }
.ps-dot { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--text-muted); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--text-muted); background:#fff; transition:all .2s; }
.ps-item.done .ps-dot { border-color:var(--gold); background:var(--gold); color:#fff; }
.ps-item.active .ps-dot { border-color:var(--gold); background:var(--bg-card-sel); color:var(--gold); box-shadow:0 0 0 3px rgba(160,120,32,.15); }
.ps-label { font-size:10px; color:var(--text-muted); white-space:nowrap; font-family:var(--font-ui); }
.ps-item.active .ps-label { color:var(--gold); font-weight:600; }
.ps-line { flex:1; height:1px; background:var(--border); min-width:10px; }

/* SUMMARY BAR */
.summary-bar { display:flex; gap:6px; flex-wrap:wrap; padding:.5rem 1.25rem; background:rgba(237,231,218,0.97); border-bottom:1px solid var(--border); min-height:40px; align-items:center; }
.sb-chip { display:flex; align-items:center; gap:4px; background:#fff; border:1px solid var(--border); border-radius:999px; padding:2px 10px; font-size:12px; font-family:var(--font-ui); }
.sb-label { color:var(--text-muted); }
.sb-val { color:var(--gold); font-weight:600; }

/* LAYOUT */
#app { min-height:100vh; display:flex; flex-direction:column; }
.step-container { flex:1; padding:1.25rem; max-width:1100px; width:100%; margin:0 auto; background:rgba(245,240,232,0.97); }
.step-header { margin-bottom:1.25rem; }
.step-header h2 { font-size:clamp(1.1rem,3vw,1.4rem); font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--gold); margin-bottom:.2rem; }
.step-header p { font-size:.9rem; color:var(--text-secondary); font-style:italic; }

/* CARDS */
.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
.card-grid.wide { grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); }
.choice-card { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:border-color .15s,box-shadow .15s,transform .12s; }
.choice-card:hover { border-color:var(--border-strong); box-shadow:var(--shadow); transform:translateY(-2px); }
.choice-card.selected { border-color:var(--gold); background:var(--bg-card-sel); box-shadow:0 0 0 2px rgba(160,120,32,.2); }
.choice-card.selected .card-chk { display:flex; }
.card-chk { display:none; position:absolute; top:7px; right:7px; width:20px; height:20px; border-radius:50%; background:var(--gold); color:#fff; font-size:12px; font-weight:700; align-items:center; justify-content:center; z-index:2; }
.card-img-wrap { position:relative; width:100%; aspect-ratio:3/4; overflow:hidden; background:#e8dfc8; display:flex; align-items:center; justify-content:center; }
.card-img-wrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.card-emoji { position:relative; z-index:0; flex-shrink:0; }
.card-body { padding:9px 11px; }
.card-name { font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:3px; }
.card-desc { font-size:11px; color:var(--text-secondary); line-height:1.4; }
.card-tags { display:flex; flex-wrap:wrap; gap:3px; margin-top:5px; }
.tag { font-size:10px; font-family:var(--font-ui); background:rgba(120,90,30,.08); border:1px solid var(--border); color:var(--text-secondary); padding:1px 5px; border-radius:3px; }
.tag.magic { background:rgba(100,0,180,.08); border-color:rgba(100,0,180,.2); color:#6b21a8; }
.tag.bonus { background:rgba(20,120,40,.08); border-color:rgba(20,120,40,.2); color:#166534; }

/* POINT BUY */
.pointbuy-wrap { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; max-width:660px; box-shadow:var(--shadow); }
.pb-points { display:flex; align-items:center; gap:12px; margin-bottom:1.25rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
.pb-points-val { font-size:2rem; font-weight:700; color:var(--gold); font-family:var(--font-display); }
.pb-points-label { font-size:13px; color:var(--text-secondary); }
.pb-points-bar { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.pb-points-fill { height:100%; background:var(--gold); border-radius:3px; transition:width .2s; }
.pb-stat-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,.05); }
.pb-stat-row:last-child { border-bottom:none; }
.pb-stat-name { width:140px; font-family:var(--font-ui); font-size:13px; font-weight:600; color:var(--text-primary); }
.pb-stat-hint { font-size:11px; color:var(--text-muted); font-style:italic; font-weight:400; margin-top:1px; }
.pb-btn { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--border-strong); background:#fff; color:var(--gold); font-size:18px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .12s; flex-shrink:0; }
.pb-btn:hover { background:var(--bg-card-sel); }
.pb-btn:disabled { opacity:.3; cursor:not-allowed; }
.pb-val { width:34px; text-align:center; font-size:1.1rem; font-weight:700; color:var(--text-primary); flex-shrink:0; }
.pb-mod { width:36px; text-align:center; font-size:12px; font-family:var(--font-ui); color:var(--text-secondary); background:var(--bg-panel); border-radius:4px; padding:2px 0; flex-shrink:0; }
.pb-cost { font-size:11px; color:var(--text-muted); flex-shrink:0; }
.race-bonus-note { font-size:11px; color:#166534; font-family:var(--font-ui); flex-shrink:0; }

/* SPELL */
.spell-info-bar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:1rem; padding:10px 14px; background:rgba(100,0,180,.06); border:1px solid rgba(100,0,180,.15); border-radius:var(--radius); font-size:13px; font-family:var(--font-ui); }
.spell-info-bar span { color:var(--text-secondary); }
.spell-info-bar strong { color:#6b21a8; }
.spell-section { margin-bottom:1.25rem; }
.spell-section-title { font-size:12px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:.6rem; padding-bottom:5px; border-bottom:1px solid var(--border); font-family:var(--font-ui); }
.spells-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px; }
.spell-card { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--radius); padding:10px 12px; cursor:pointer; transition:border-color .12s; position:relative; }
.spell-card:hover { border-color:rgba(100,0,180,.3); background:#faf6ff; }
.spell-card.selected { border-color:#7c3aed; background:#f5f0ff; }
.spell-card.selected::after { content:"✓"; position:absolute; top:6px; right:8px; color:#7c3aed; font-size:14px; font-weight:700; }
.spell-name { font-weight:700; font-size:13px; color:var(--text-primary); margin-bottom:2px; }
.spell-school { font-size:11px; color:var(--text-muted); margin-bottom:4px; font-family:var(--font-ui); }
.spell-desc { font-size:12px; color:var(--text-secondary); line-height:1.4; }

/* EQUIP */
.equip-section { margin-bottom:1.5rem; }
.equip-title { font-size:12px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:.6rem; padding-bottom:5px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; font-family:var(--font-ui); }
.equip-count { font-size:11px; color:var(--text-muted); text-transform:none; letter-spacing:0; font-weight:400; }
.equip-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:8px; }
.equip-card { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--radius); padding:10px 12px; cursor:pointer; transition:border-color .12s; position:relative; }
.equip-card:hover { border-color:var(--border-strong); }
.equip-card.selected { border-color:var(--gold); background:var(--bg-card-sel); }
.equip-card.selected::after { content:"✓"; position:absolute; top:6px; right:8px; color:var(--gold); font-size:13px; font-weight:700; }
.equip-card.disabled { opacity:.35; pointer-events:none; }
.equip-name { font-size:13px; font-weight:600; color:var(--text-primary); margin-bottom:4px; }
.equip-stat { font-size:12px; color:var(--text-secondary); line-height:1.4; }

/* BACKGROUND CARDS */
.bg-list { display:grid; gap:8px; max-width:680px; }
.bg-card { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--radius-lg); padding:13px 15px; cursor:pointer; transition:border-color .12s; position:relative; }
.bg-card:hover { border-color:var(--border-strong); background:var(--bg-card-hover); }
.bg-card.selected { border-color:var(--gold); background:var(--bg-card-sel); }
.bg-card.selected::after { content:"✓"; position:absolute; top:12px; right:14px; color:var(--gold); font-size:15px; }
.bg-card-name { font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
.bg-card-desc { font-size:13px; color:var(--text-secondary); line-height:1.5; }
.bg-card-skills { font-size:11px; color:var(--text-muted); margin-top:5px; font-family:var(--font-ui); }

/* CHARACTER SHEET */
.sheet-wrap { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; max-width:900px; box-shadow:var(--shadow); }
.sheet-hero { background:#2a1f0e; padding:1.25rem; display:flex; gap:1.25rem; align-items:flex-start; flex-wrap:wrap; border-bottom:2px solid var(--gold-dim); }
.sheet-portrait { width:88px; height:120px; border-radius:var(--radius); overflow:hidden; border:2px solid var(--gold-dim); flex-shrink:0; background:#3d2e18; position:relative; display:flex; align-items:center; justify-content:center; }
.sheet-portrait img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.sheet-hero-info { flex:1; min-width:180px; }
.sheet-char-name { font-size:1.4rem; font-weight:700; color:var(--gold-light); margin-bottom:6px; }
.sheet-meta { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.sheet-meta-item { font-size:11px; font-family:var(--font-ui); background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:4px; padding:2px 7px; color:#c4a878; }
.sheet-meta-item strong { color:#f5dca0; }
.sheet-vitals { display:flex; gap:8px; flex-wrap:wrap; }
.vital-box { background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.15); border-radius:var(--radius); padding:7px 13px; text-align:center; min-width:65px; }
.vital-val { font-size:1.25rem; font-weight:700; color:#f5f0e8; }
.vital-val.hp { color:#fca5a5; }
.vital-val.ac { color:#93c5fd; }
.vital-val.init { color:#86efac; }
.vital-label { font-size:9px; font-family:var(--font-ui); color:#a0855a; text-transform:uppercase; letter-spacing:.06em; }
.sheet-body { padding:1.1rem; display:grid; grid-template-columns:1fr 1fr; gap:.9rem; }
.sheet-section { background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius); padding:11px; }
.sheet-section-title { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--border); font-family:var(--font-ui); }
.stat-grid-sheet { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.stat-block { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:7px 5px; text-align:center; }
.stat-block-name { font-size:9px; font-family:var(--font-ui); font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:2px; }
.stat-block-val { font-size:1.1rem; font-weight:700; color:var(--text-primary); }
.stat-block-mod { font-size:11px; font-family:var(--font-ui); color:var(--text-secondary); }
.feature-list { list-style:none; }
.feature-list li { font-size:12px; color:var(--text-secondary); padding:4px 0; border-bottom:1px solid rgba(0,0,0,.05); line-height:1.5; }
.feature-list li:last-child { border-bottom:none; }
.feat-name { color:var(--text-primary); font-weight:600; }
.sheet-list { list-style:none; }
.sheet-list li { font-size:12px; color:var(--text-secondary); padding:4px 0; border-bottom:1px solid rgba(0,0,0,.05); display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
.sheet-list li:last-child { border-bottom:none; }
.sh-name { color:var(--text-primary); }
.sh-val { text-align:right; font-size:11px; }
.spell-slots-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(55px,1fr)); gap:5px; }
.slot-box { background:#f3e8ff; border:1px solid #c4b5fd; border-radius:var(--radius); padding:5px 4px; text-align:center; }
.slot-level { font-size:9px; color:#7c3aed; text-transform:uppercase; letter-spacing:.05em; font-family:var(--font-ui); }
.slot-count { font-size:.95rem; font-weight:700; color:#6d28d9; }

/* GOLD */
.gold-roll-box { display:flex; align-items:center; gap:12px; padding:13px 16px; background:#fefce8; border:1px solid #fbbf24; border-radius:var(--radius); margin-top:1rem; }
.gold-val { font-size:1.5rem; font-weight:700; color:#92400e; }
.gold-label { font-size:13px; color:#78350f; }

/* BOTTOM NAV */
.bottom-nav { position:sticky; bottom:0; z-index:10; background:rgba(255,255,255,0.97); border-top:1.5px solid var(--border); padding:.65rem 1.25rem; display:flex; justify-content:space-between; align-items:center; gap:8px; box-shadow:0 -2px 12px rgba(80,50,10,.08); }
.btn { font-family:var(--font-ui); font-size:13px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:9px 20px; border-radius:var(--radius); border:1.5px solid; cursor:pointer; transition:all .12s; white-space:nowrap; }
.btn-primary { background:var(--gold); border-color:var(--gold); color:#fff; }
.btn-primary:hover { background:var(--gold-light); border-color:var(--gold-light); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; }
.btn-secondary { background:#fff; border-color:var(--border-strong); color:var(--text-secondary); }
.btn-secondary:hover { border-color:var(--gold); color:var(--text-primary); }
.btn-ghost { background:transparent; border-color:transparent; color:var(--text-muted); padding:9px 12px; }
.btn-ghost:hover { color:var(--gold); }
.nav-right { display:flex; gap:6px; align-items:center; }
.link-ref { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-family:var(--font-ui); color:var(--gold-dim); border:1px solid var(--border); border-radius:4px; padding:3px 8px; text-decoration:none; }
.link-ref:hover { color:var(--gold); border-color:var(--border-strong); }
.subgroup-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-top:10px; margin-bottom:5px; font-family:var(--font-ui); }
.kd-preview { margin-top:1rem; padding:10px 14px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:var(--radius); font-size:13px; font-family:var(--font-ui); color:var(--text-secondary); }
@media(max-width:600px) {
  .step-container { padding:.9rem; }
  .card-grid { grid-template-columns:repeat(2,1fr); }
  .card-grid.wide { grid-template-columns:repeat(2,1fr); }
  .sheet-body { grid-template-columns:1fr; }
  .pb-stat-name { width:110px; }
  .btn { padding:8px 12px; font-size:12px; }
}
@media(prefers-reduced-motion:reduce) { * { transition:none !important; } }

  .ai-btn{position:fixed;bottom:80px;right:20px;z-index:100;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);border:2px solid rgba(168,85,247,.4);box-shadow:0 4px 20px rgba(124,58,237,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;transition:transform .15s;}

  .ai-badge.show{display:flex;}
  @media(max-width:600px){.ai-btn{bottom:75px;right:12px;}}

  .ai-head-icon{font-size:20px;}
  .ai-head h3{color:#fff;font-size:14px;font-weight:700;flex:1;letter-spacing:.03em;}
  .ai-head small{color:rgba(255,255,255,.7);font-size:10px;}
  .ai-x{background:rgba(255,255,255,.2);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  .ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth;}
  .ai-msgs::-webkit-scrollbar{width:3px;}
  .ai-msgs::-webkit-scrollbar-thumb{background:rgba(124,58,237,.2);border-radius:2px;}
  .ai-row{display:flex;gap:7px;align-items:flex-start;}
  .ai-row.me{flex-direction:row-reverse;}
  .ai-ava{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;background:linear-gradient(135deg,#7c3aed,#a855f7);}
  .ai-row.me .ai-ava{background:#a07820;}
  .ai-bub{max-width:82%;padding:8px 12px;border-radius:13px;font-size:13px;line-height:1.55;color:#2a1f0e;background:#f3e8ff;border:1px solid #e9d5ff;font-family:var(--font-ui);}
  .ai-row.me .ai-bub{background:#fdf4e7;border-color:#f5dca0;}
  .ai-chips{padding:0 12px 9px;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}

  .ai-go:disabled{opacity:.35;cursor:not-allowed;}

let STEPS=[];

function rebuildSteps(){
  const s=[{id:'race',label:'Раса'},{id:'class',label:'Класс'},{id:'background',label:'Предыстория'},{id:'stats',label:'Характеристики'}];
  const c=CLASSES.find(x=>x.id===state.cls);
  if(c&&c.isMagic) s.push({id:'spells',label:'Заклинания'});
  s.push({id:'equipment',label:'Снаряжение'});
  s.push({id:'sheet',label:'Лист персонажа'});
  STEPS=s;
}
rebuildSteps();

// HELPERS
function mod(v){return Math.floor((v-10)/2);}
function modStr(v){const m=mod(v);return m>=0?'+'+m:''+m;}
function spentPts(){return ['STR','DEX','CON','INT','WIS','CHA'].reduce((s,k)=>s+(POINT_COST[state.stats[k]]||0),0);}
function rem(){return 27-spentPts();}

function totalStats(){
  const r=RACES.find(x=>x.id===state.race);
  const t={...state.stats};
  if(r&&r.bonuses) Object.entries(r.bonuses).forEach(([k,v])=>{t[k]=(t[k]||0)+v;});
  return t;
}

function calcWeaponStats(w){
  const t=totalStats(); const prof=2;
  let sm=w.ranged?mod(t.DEX):w.finesse?Math.max(mod(t.STR),mod(t.DEX)):mod(t.STR);
  const hit=sm+prof;
  const hitStr='к20 '+(hit>=0?'+ '+hit:hit);
  const dmgStr=sm>0?w.dmg+' + '+sm:sm<0?w.dmg+' '+sm:w.dmg;
  const statN=w.ranged?'Ловкость':w.finesse?'Сила/Ловк.':'Сила';
  return{hitStr,dmgStr,statN};
}

function calcAC(){
  const c=CLASSES.find(x=>x.id===state.cls);
  const t=totalStats();
  const a=ARMOR.find(x=>x.id===state.selectedArmor);
  const sh=state.selectedShield?2:0;
  if(!a||a.id==='none'){
    if(c?.acFormula==='barb') return 10+mod(t.DEX)+mod(t.CON)+sh;
    if(c?.acFormula==='monk') return 10+mod(t.DEX)+mod(t.WIS)+sh;
    return 10+mod(t.DEX)+sh;
  }
  if(a.type==='light') return a.ac+mod(t.DEX)+sh;
  if(a.type==='medium') return a.ac+Math.min(2,mod(t.DEX))+sh;
  return a.ac+sh;
}
function calcHP(){const c=CLASSES.find(x=>x.id===state.cls);if(!c)return'—';return c.hitDie+mod(totalStats().CON);}
function calcSpeed(){const r=RACES.find(x=>x.id===state.race);return r?r.speed:'—';}
function calcInit(){return modStr(totalStats().DEX);}

function getWeapons(){
  const c=CLASSES.find(x=>x.id===state.cls);
  if(!c) return[];
  const pr=c.prof.weapons;
  const hasMartial=pr.some(p=>p.includes('Воинское'));
  const hasSimple=hasMartial||pr.some(p=>p.includes('Простое'));
  const named=pr.filter(p=>!p.includes('оружие'));
  const all=[
    ...WEAPONS.simple_melee.map(w=>({...w,grp:'Простое ближнее'})),
    ...WEAPONS.simple_ranged.map(w=>({...w,grp:'Простое дальнее'})),
    ...WEAPONS.martial_melee.map(w=>({...w,grp:'Воинское ближнее'})),
    ...WEAPONS.martial_ranged.map(w=>({...w,grp:'Воинское дальнее'})),
  ];
  return all.filter(w=>{
    if(hasMartial) return true;
    if(hasSimple&&(w.grp.includes('Простое'))) return true;
    if(named.some(n=>w.name.includes(n.replace(/[ыеауий]$/,'')))) return true;
    return false;
  });
}

function getArmor(){
  const c=CLASSES.find(x=>x.id===state.cls);
  if(!c) return[ARMOR[0]];
  const pr=c.prof.armor;
  const hasAll=pr.some(p=>p.includes('Все'));
  const hasHeavy=hasAll||pr.some(p=>p.includes('Тяжёл'));
  const hasMed=hasHeavy||pr.some(p=>p.includes('Сред'));
  const hasLight=hasMed||pr.some(p=>p.includes('Лёгк'));
  return ARMOR.filter(a=>{
    if(a.id==='none') return true;
    if(a.cat==='Лёгкие') return hasLight;
    if(a.cat==='Средние') return hasMed;
    if(a.cat==='Тяжёлые') return hasHeavy;
    return false;
  });
}
function hasShieldProf(){const c=CLASSES.find(x=>x.id===state.cls);return c&&c.prof.armor.some(p=>p.includes('Щит'));}

function rollGold(){state.startGold=Math.floor(Math.random()*50)+1;}

function randomize(){
  state.race=RACES[Math.floor(Math.random()*RACES.length)].id;
  state.cls=CLASSES[Math.floor(Math.random()*CLASSES.length)].id;
  state.background=BACKGROUNDS[Math.floor(Math.random()*BACKGROUNDS.length)].id;
  ['STR','DEX','CON','INT','WIS','CHA'].forEach(k=>state.stats[k]=8);
  let pts=27;
  ['STR','DEX','CON','INT','WIS','CHA'].forEach(k=>{
    while(pts>0&&state.stats[k]<15){
      const nxt=state.stats[k]+1;
      const cost=(POINT_COST[nxt]||0)-(POINT_COST[state.stats[k]]||0);
      if(cost<=pts){state.stats[k]++;pts-=cost;}else break;
    }
  });
  const c=CLASSES.find(x=>x.id===state.cls);
  if(c&&c.isMagic){
    const sp=SPELLS[state.cls]||{};
    state.selectedCantrips=(sp.cantrips||[]).slice(0,c.cantripsKnown||0).map(s=>s.id);
    state.selectedSpells=(sp.spells1||[]).slice(0,c.spellsKnown||2).map(s=>s.id);
  }
  const ww=getWeapons();
  state.selectedWeapons=ww.slice(0,Math.min(2,ww.length)).map(w=>w.id);
  const aa=getArmor();
  state.selectedArmor=aa[aa.length-1]?.id||'none';
  state.selectedShield=hasShieldProf();
  rollGold();
  rebuildSteps();
  state.step=STEPS.length-1;
  render();
}

function render(){rebuildSteps();renderProgress();renderSummary();renderStep();renderNav();}

function renderProgress(){
  document.getElementById('progressSteps').innerHTML=STEPS.map((s,i)=>{
    const cls=i<state.step?'done':i===state.step?'active':'';
    const sep=i<STEPS.length-1?'<div class="ps-line"></div>':'';
    return `<div class="ps-item ${cls}" onclick="goTo(${i})"><div class="ps-dot">${i<state.step?'✓':i+1}</div><div class="ps-label">${s.label}</div></div>${sep}`;
  }).join('');
}

function renderSummary(){
  const r=RACES.find(x=>x.id===state.race);
  const c=CLASSES.find(x=>x.id===state.cls);
  const bg=BACKGROUNDS.find(x=>x.id===state.background);
  let chips='';
  if(r) chips+=`<div class="sb-chip"><span class="sb-label">Раса:</span><span class="sb-val">${r.name}</span></div>`;
  if(c) chips+=`<div class="sb-chip"><span class="sb-label">Класс:</span><span class="sb-val">${c.name}</span></div>`;
  if(bg) chips+=`<div class="sb-chip"><span class="sb-label">Предыстория:</span><span class="sb-val">${bg.name}</span></div>`;
  if(c){const t=totalStats();chips+=`<div class="sb-chip"><span class="sb-label">КД:</span><span class="sb-val">${calcAC()}</span></div><div class="sb-chip"><span class="sb-label">ХП:</span><span class="sb-val">${calcHP()}</span></div>`;}
  document.getElementById('summaryBar').innerHTML=chips||'<span style="font-size:12px;color:#9c7d50;font-style:italic;">Выберите расу и класс, чтобы начать</span>';
}

function renderNav(){
  document.getElementById('btnBack').style.visibility=state.step>0?'visible':'hidden';
  const last=state.step===STEPS.length-1;
  document.getElementById('btnNext').textContent=last?'— Готово —':'Далее →';
  document.getElementById('btnNext').disabled=last;
}

function renderStep(){
  const id=STEPS[state.step]?.id;
  const el=document.getElementById('stepContainer');
  if(id==='race') el.innerHTML=renderRace();
  else if(id==='class') el.innerHTML=renderClass();
  else if(id==='background') el.innerHTML=renderBg();
  else if(id==='stats') el.innerHTML=renderStats();
  else if(id==='spells') el.innerHTML=renderSpells();
  else if(id==='equipment') el.innerHTML=renderEquip();
  else if(id==='sheet') el.innerHTML=renderSheet();
  bindEvents(id);
}

function cardImg(img,emoji){
  return `<div class="card-img-wrap">
    <span class="card-emoji" style="font-size:2.8rem;">${emoji}</span>
    <img src="${img}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;"
      onload="this.previousElementSibling.style.display='none'"
      onerror="this.style.display='none'">
  </div>`;
}

function renderBg(){

  <div class="bg-list">${BACKGROUNDS.map(b=>`

function renderStats(){
  const c=CLASSES.find(x=>x.id===state.cls);
  const r=RACES.find(x=>x.id===state.race);
  const left=rem();
  const pct=Math.round((1-left/27)*100);
  const rows=['STR','DEX','CON','INT','WIS','CHA'].map(k=>{
    const v=state.stats[k];
    const rb=r?.bonuses?.[k]||0;
    const total=v+rb;
    const hint=c?.statHints?.[k]||'';
    const canDown=v>8;
    const canUp=v<15&&rem()>=((POINT_COST[v+1]||0)-(POINT_COST[v]||0));
    return `<div class="pb-stat-row">
      <div class="pb-stat-name">${STAT_NAMES[k]}${hint?`<div class="pb-stat-hint">${hint}</div>`:''}
      </div>
      <button class="pb-btn" onclick="chgStat('${k}',-1)" ${canDown?'':'disabled'}>−</button>
      <div class="pb-val">${v}</div>
      <button class="pb-btn" onclick="chgStat('${k}',1)" ${canUp?'':'disabled'}>+</button>
      <div class="pb-mod">${modStr(v)}</div>
      ${rb>0
        ?`<span class="race-bonus-note">+${rb} раса → <b>${total}</b> (${modStr(total)})</span>`
        :`<span class="pb-cost">${POINT_COST[v]||0} оч.</span>`
      }
    </div>`;
  }).join('');
  return `<div class="step-header"><h2>Характеристики</h2><p>Метод «Закупка очков» — 27 очков, максимум 15 в одном стате</p></div>
  <div class="pointbuy-wrap">
    <div class="pb-points">
      <div><div class="pb-points-val">${left}</div><div class="pb-points-label">очков осталось из 27</div></div>
      <div class="pb-points-bar"><div class="pb-points-fill" style="width:${pct}%"></div></div>
    </div>
    ${rows}
  </div>`;
}

function renderSpells(){

  const sp=SPELLS[state.cls]||{cantrips:[],spells1:[]};
  const maxC=c.cantripsKnown||0, maxS=c.spellsKnown||0;
  let h=`<div class="step-header"><h2>Заклинания</h2><p>Выберите заговоры и заклинания 1 уровня для ${c.name}а</p></div>
  <div class="spell-info-bar">
    <span>Заговоры: <strong>${state.selectedCantrips.length} / ${maxC}</strong></span>
    <span>Заклинания 1 ур.: <strong>${state.selectedSpells.length} / ${maxS}</strong></span>
    <span>Характеристика: <strong>${STAT_NAMES[c.spellAbility]}</strong></span>
    <span>Ячейки: <strong>${c.slots?.[0]||0} × 1 ур.</strong></span>

    h+=`<div class="spell-section"><div class="spell-section-title">Заговоры — выберите ${maxC}</div><div class="spells-grid">

    h+=`<div class="spell-section"><div class="spell-section-title">Заклинания 1 уровня — выберите ${maxS}</div><div class="spells-grid">

    </div></div>`;

  h+=`<div style="margin-top:.75rem;"><a class="link-ref" href="https://5e14.ttg.club/" target="_blank">📖 Подробнее на 5e14.ttg.club</a></div>`;
  return h;

  let h=`<div class="step-header"><h2>Снаряжение</h2><p>Выберите оружие (до 2 шт.), доспех и щит по владениям класса</p></div>`;

        <div class="equip-stat" style="font-size:11px;color:#9c7d50;">Стат: ${ws2.statN}${w.props?' · '+w.props:''}</div>
      </div>`;

    h+=`</div>`;
  }
  h+=`</div>`;
  h+=`<div class="equip-section"><div class="equip-title">Доспех</div><div class="equip-grid">`;
  h+=avA.map(a=>`<div class="equip-card ${state.selectedArmor===a.id?'selected':''}" data-armor="${a.id}">
    <div class="equip-name">${a.name}</div>
    <div class="equip-stat">${a.desc}</div>
    ${a.cat!=='none'?`<div class="equip-stat" style="font-size:11px;color:#9c7d50;">${a.cat}</div>`:''}

    <button class="btn btn-secondary" onclick="rollGold();document.getElementById('goldVal').textContent='🪙 '+state.startGold;">🎲 Перебросить</button>

  h+=`<div class="kd-preview">КД: <b style="color:#1d4ed8;">${calcAC()}</b> · ХП: <b style="color:#b91c1c;">${calcHP()}</b> · Инициатива: <b style="color:#166534;">${calcInit()}</b> · Скорость: <b>${calcSpeed()} фт.</b></div>`;
  return h;

// EVENTS
function bindEvents(id){
  if(id==='race') document.querySelectorAll('[data-race]').forEach(el=>el.addEventListener('click',()=>{state.race=el.dataset.race;state.step=Math.max(state.step,1);render();}));
  if(id==='class') document.querySelectorAll('[data-cls]').forEach(el=>el.addEventListener('click',()=>{state.cls=el.dataset.cls;state.selectedCantrips=[];state.selectedSpells=[];state.selectedWeapons=[];state.selectedArmor='none';state.selectedShield=false;state.step=Math.max(state.step,2);rebuildSteps();render();}));
  if(id==='background') document.querySelectorAll('[data-bg]').forEach(el=>el.addEventListener('click',()=>{state.background=el.dataset.bg;state.step=Math.max(state.step,3);render();}));
  if(id==='spells'){
    document.querySelectorAll('[data-cantrip]').forEach(el=>el.addEventListener('click',()=>{
      const c=CLASSES.find(x=>x.id===state.cls),max=c?.cantripsKnown||0,id=el.dataset.cantrip,idx=state.selectedCantrips.indexOf(id);
      if(idx>=0) state.selectedCantrips.splice(idx,1);
      else if(state.selectedCantrips.length<max) state.selectedCantrips.push(id);
      render();
    }));
    document.querySelectorAll('[data-spell]').forEach(el=>el.addEventListener('click',()=>{
      const c=CLASSES.find(x=>x.id===state.cls),max=c?.spellsKnown||0,id=el.dataset.spell,idx=state.selectedSpells.indexOf(id);
      if(idx>=0) state.selectedSpells.splice(idx,1);
      else if(state.selectedSpells.length<max) state.selectedSpells.push(id);
      render();
    }));
  }
  if(id==='equipment'){
    document.querySelectorAll('[data-weapon]').forEach(el=>el.addEventListener('click',()=>{
      const wid=el.dataset.weapon,idx=state.selectedWeapons.indexOf(wid);
      if(idx>=0) state.selectedWeapons.splice(idx,1);
      else if(state.selectedWeapons.length<2) state.selectedWeapons.push(wid);
      render();
    }));
    document.querySelectorAll('[data-armor]').forEach(el=>el.addEventListener('click',()=>{state.selectedArmor=el.dataset.armor;render();}));
    const sh=document.getElementById('shieldCard');
    if(sh) sh.addEventListener('click',()=>{state.selectedShield=!state.selectedShield;render();});
  }
}

function chgStat(k,d){
  const v=state.stats[k],n=v+d;
  if(n<8||n>15) return;
  if(d>0){const cost=(POINT_COST[n]||0)-(POINT_COST[v]||0);if(rem()<cost) return;}
  state.stats[k]=n; render();
}

function goTo(i){if(i<=state.step){state.step=i;render();}}

document.getElementById('btnNext').addEventListener('click',()=>{if(state.step<STEPS.length-1){state.step++;render();}});
document.getElementById('btnBack').addEventListener('click',()=>{if(state.step>0){state.step--;render();}});
document.getElementById('btnRandom').addEventListener('click',randomize);

if(!state.startGold) rollGold();
render();

// ===== AI ASSISTANT =====
(function(){
  var SYS="Ты — помощник по правилам D&D 5e, строго опирающийся только на Player's Handbook (PHB).\n\nПРАВИЛА:\n- Отвечай ТОЛЬКО по Player's Handbook 5-го издания\n- Если вопрос не про D&D/PHB — вежливо откажись\n- Указывай главу PHB (например: PHB, гл.7)\n- Отвечай на русском языке\n- Не более 200 слов\n- Не придумывай правила которых нет в PHB\n- Ключевые термины выделяй **жирным**";

  var fab=document.getElementById('aiFab');
  var win=document.getElementById('aiWin');
  var closeBtn=document.getElementById('aiClose');
  var msgsEl=document.getElementById('aiMsgs');
  var inp=document.getElementById('aiInp');
  var go=document.getElementById('aiGo');
  var chips=document.getElementById('aiChips');

  var open=false, busy=false, hist=[];

  var CHIP_Q={
    'Point Buy?':'Как работает Point Buy при распределении характеристик?',
    'Спасбросок?':'Что такое спасбросок и как он работает?',
    'КД без доспеха?':'Как считается КД без доспеха у разных классов?',
    'Концентрация?':'Что такое концентрация заклинания?',
    'Преим./помеха?':'Как работает преимущество и помеха на бросок?',
    'Короткий/долгий отдых?':'Чем отличаются короткий и долгий отдых?'
  };

  function toggle(){
    open=!open;
    win.classList.toggle('show',open);
    fab.classList.toggle('active',open);
    if(open){inp.focus();scroll();}
  }
  function scroll(){setTimeout(function(){msgsEl.scrollTop=msgsEl.scrollHeight;},60);}

  function addMsg(role,text){
    var d=document.createElement('div');
    d.className='ai-row'+(role==='me'?' me':'');
    var safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    d.innerHTML='<div class="ai-ava">'+(role==='me'?'🧙':'📖')+'</div><div class="ai-bub">'+safe+'</div>';
    msgsEl.appendChild(d);scroll();return d;
  }

  function showTyping(){
    var d=document.createElement('div');d.className='ai-row';d.id='aiTyp';
    d.innerHTML='<div class="ai-ava">📖</div><div class="ai-bub" style="padding:6px 10px;"><div class="ai-dot-wrap"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div></div>';
    msgsEl.appendChild(d);scroll();
  }
  function hideTyping(){var t=document.getElementById('aiTyp');if(t)t.remove();}

  function send(text){
    text=(text||'').trim();
    if(!text||busy)return;
    busy=true;go.disabled=true;
    chips.style.display='none';
    addMsg('me',text);
    hist.push({role:'user',content:text});
    inp.value='';inp.style.height='auto';
    showTyping();

    // URL воркера/API — сохраняется в localStorage
    // По умолчанию использует локальный /api/anthropic (для Vercel)
    var workerUrl = localStorage.getItem('ai_worker_url') || '/api/chat';

    fetch(workerUrl, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:SYS,messages:hist})
    })
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){
      hideTyping();
      var reply=d.content&&d.content[0]&&d.content[0].text
        ? d.content[0].text
        : (d.error ? '⚠️ Ошибка API: '+d.error.message : 'Пустой ответ.');
      hist.push({role:'assistant',content:reply});
      addMsg('bot',reply);
    })
    .catch(function(e){
      hideTyping();
      addMsg('bot','⚠️ Ошибка: '+e.message+'. Проверь URL воркера в настройках (⚙️).');
    })
    .finally(function(){busy=false;go.disabled=false;});
  }

  // --- SETUP SCREEN ---
  function showSetup(){
    var existingSetup = document.getElementById('aiSetup');
    if(existingSetup){ existingSetup.style.display='flex'; return; }

    var setup = document.createElement('div');
    setup.id = 'aiSetup';
    setup.style.cssText='position:absolute;inset:0;background:#fff;z-index:10;display:flex;flex-direction:column;padding:20px;gap:12px;border-radius:18px;';
    setup.innerHTML = [
      '<div style="font-size:13px;font-weight:700;color:#6d28d9;">⚙️ Настройка AI-помощника</div>',
      '<div style="font-size:12px;color:#5a3e20;line-height:1.6;">',
      'Для работы AI нужен <b>Cloudflare Worker</b> как прокси.',
      '<br><br>',
      '<b>Быстрая настройка (5 минут):</b><br>',
      '1. Зайди на <a href="https://workers.cloudflare.com" target="_blank" style="color:#7c3aed;">workers.cloudflare.com</a><br>',
      '2. Создай новый Worker<br>',
      '3. Вставь код из файла <b>worker.js</b> (в папке сайта)<br>',
      '4. В Settings → Variables добавь: <code style="background:#f3e8ff;padding:1px 5px;border-radius:3px;">ANTHROPIC_API_KEY</code> = твой ключ<br>',
      '5. Задеплой и скопируй URL воркера сюда:',
      '</div>',
      '<input id="aiWorkerInp" type="url" placeholder="https://my-worker.your-name.workers.dev" style="border:1.5px solid #e9d5ff;border-radius:8px;padding:8px 10px;font-size:13px;outline:none;width:100%;">',
      '<button id="aiWorkerSave" style="background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;color:#fff;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;">Сохранить и начать</button>',
      '<button id="aiWorkerSkip" style="background:transparent;border:1px solid #e9d5ff;color:#9c7d50;border-radius:8px;padding:8px;font-size:12px;cursor:pointer;">Отмена</button>',
    ].join('');
    document.getElementById('aiWin').appendChild(setup);

    document.getElementById('aiWorkerSave').addEventListener('click', function(){
      var url = document.getElementById('aiWorkerInp').value.trim();
      if(!url){ alert('Введи URL воркера'); return; }
      localStorage.setItem('ai_worker_url', url);
      setup.style.display='none';
      addMsg('bot','✅ Готово! Теперь можешь задавать вопросы по правилам PHB.');
    });
    document.getElementById('aiWorkerSkip').addEventListener('click', function(){
      setup.style.display='none';
    });
  }  // Show setup on first open if no worker configured
  fab.addEventListener('click', toggle);
  closeBtn.addEventListener('click',toggle);
  go.addEventListener('click',function(){send(inp.value);});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(inp.value);}});
  inp.addEventListener('input',function(){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,80)+'px';});
  chips.querySelectorAll('.ai-chip').forEach(function(c){
    c.addEventListener('click',function(){send(CHIP_Q[c.textContent]||c.textContent);});
  });
  document.addEventListener('click',function(e){
    if(open&&!win.contains(e.target)&&!fab.contains(e.target))toggle();
  });
})();

</script>
    <div class="ai-msgs" id="aiMsgs">
      <div class="ai-row">
        <div class="ai-ava">📖</div>
        <div class="ai-bub">Привет! Задавай вопросы по правилам D&amp;D 5e — отвечу строго по <b>Player's Handbook</b> со ссылкой на главу.</div>
      </div>
    </div>
    <div class="ai-chips" id="aiChips">
      <button class="ai-chip">Point Buy?</button>
      <button class="ai-chip">Спасбросок?</button>
      <button class="ai-chip">КД без доспеха?</button>
      <button class="ai-chip">Концентрация?</button>
      <button class="ai-chip">Преим./помеха?</button>
      <button class="ai-chip">Короткий/долгий отдых?</button>
    </div>
    <div class="ai-inp-wrap">
      <textarea class="ai-inp" id="aiInp" placeholder="Вопрос по правилам PHB..." rows="1"></textarea>
      <button class="ai-go" id="aiGo">&#10148;</button>
    </div>
  </div>

</body>
</html>
