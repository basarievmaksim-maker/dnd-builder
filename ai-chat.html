<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Помощник по PHB</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,sans-serif;background:#faf5ff;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:linear-gradient(135deg,#7c3aed,#a855f7);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.header h1{color:#fff;font-size:15px;font-weight:700;flex:1;}
.header p{color:rgba(255,255,255,.75);font-size:11px;}
.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.msg{display:flex;gap:8px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;}
.msg.user .avatar{background:#a07820;}
.bubble{max-width:80%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.6;color:#2a1f0e;background:#f3e8ff;border:1px solid #e9d5ff;}
.msg.user .bubble{background:#fdf4e7;border-color:#f5dca0;}
.bubble b{font-weight:700;}
.bubble code{background:rgba(124,58,237,.1);padding:1px 5px;border-radius:4px;font-size:12px;}
.typing{display:flex;gap:4px;padding:8px 6px;align-items:center;}
.typing span{width:7px;height:7px;border-radius:50%;background:#a855f7;animation:dot 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.suggestions{padding:4px 14px 10px;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}
.chip{font-size:11px;background:#f3e8ff;border:1px solid #e9d5ff;color:#6d28d9;border-radius:999px;padding:3px 10px;cursor:pointer;transition:background .12s;}
.chip:hover{background:#e9d5ff;}
.input-row{padding:10px 14px;border-top:1px solid #e9d5ff;display:flex;gap:8px;flex-shrink:0;background:#fff;}
textarea{flex:1;border:1.5px solid #e9d5ff;border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;color:#2a1f0e;background:#faf5ff;outline:none;resize:none;line-height:1.4;max-height:80px;}
textarea:focus{border-color:#a855f7;}
button.send{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:flex-end;transition:opacity .15s;flex-shrink:0;}
button.send:hover{opacity:.85;}
button.send:disabled{opacity:.35;cursor:not-allowed;}
.disclaimer{font-size:10px;color:#9c7d50;text-align:center;padding:4px 14px 2px;flex-shrink:0;}
</style>
</head>
<body>
<div class="header">
  <div style="font-size:20px;">📖</div>
  <div><h1>Помощник по правилам D&D 5e</h1><p>Отвечаю только по Player's Handbook</p></div>
</div>
<div class="messages" id="msgs">
  <div class="msg">
    <div class="avatar">📖</div>
    <div class="bubble">Привет! Задавай вопросы по правилам D&amp;D 5e из <b>Player's Handbook</b>. Отвечу со ссылкой на главу. Спрашивай про классы, расы, заклинания, бой, характеристики!</div>
  </div>
</div>
<div class="suggestions" id="sugg">
  <button class="chip" onclick="ask('Как работает Point Buy при распределении характеристик?')">Point Buy?</button>
  <button class="chip" onclick="ask('Что такое спасбросок и как он работает?')">Спасбросок?</button>
  <button class="chip" onclick="ask('Как считается КД без доспеха у разных классов?')">КД без доспеха?</button>
  <button class="chip" onclick="ask('Что такое концентрация заклинания и как она работает?')">Концентрация?</button>
  <button class="chip" onclick="ask('Как работает преимущество и помеха на бросок кубика?')">Преим./помеха?</button>
  <button class="chip" onclick="ask('Чем отличаются короткий и долгий отдых?')">Отдых?</button>
</div>
<div class="disclaimer">Ответы основаны на PHB D&D 5e • claude-sonnet-4</div>
<div class="input-row">
  <textarea id="inp" placeholder="Вопрос по правилам PHB..." rows="1"></textarea>
  <button class="send" id="sendBtn">&#10148;</button>
</div>
<script>
var SYS = "Ты — помощник по правилам D&D 5e, строго опирающийся только на Player's Handbook (PHB).\n\nПРАВИЛА:\n- Отвечай ТОЛЬКО на основе Player's Handbook 5-го издания D&D\n- Если вопрос не относится к D&D или PHB — вежливо откажись\n- Всегда указывай главу или раздел PHB (например: PHB, глава 7 «Использование оценок характеристик»)\n- Отвечай на русском языке\n- Ответы чёткие, не больше 250 слов\n- Не придумывай правила которых нет в PHB\n- Если точно не знаешь — скажи честно и укажи в какую главу PHB заглянуть\n- Используй **жирный** для выделения ключевых терминов";

var hist = [];
var loading = false;
var msgs = document.getElementById('msgs');
var inp = document.getElementById('inp');
var sendBtn = document.getElementById('sendBtn');
var sugg = document.getElementById('sugg');

function scroll(){setTimeout(function(){msgs.scrollTop=msgs.scrollHeight;},60);}

function addMsg(role, text){
  var d = document.createElement('div');
  d.className = 'msg' + (role==='user' ? ' user' : '');
  var safe = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/`(.+?)`/g,'<code>$1</code>');
  d.innerHTML = '<div class="avatar">'+(role==='user'?'🧙':'📖')+'</div><div class="bubble">'+safe+'</div>';
  msgs.appendChild(d);
  scroll();
}

function showTyping(){
  var d=document.createElement('div');d.className='msg';d.id='typing';
  d.innerHTML='<div class="avatar">📖</div><div class="bubble" style="padding:6px 10px;"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(d);scroll();
}
function hideTyping(){var t=document.getElementById('typing');if(t)t.remove();}

function ask(text){
  text = (text||inp.value).trim();
  if(!text||loading) return;
  loading=true; sendBtn.disabled=true;
  sugg.style.display='none';
  addMsg('user',text);
  hist.push({role:'user',content:text});
  inp.value=''; inp.style.height='auto';
  showTyping();

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system:SYS,
      messages:hist
    })
  })
  .then(function(r){
    if(!r.ok) return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
    return r.json();
  })
  .then(function(data){
    hideTyping();
    var reply = data.content&&data.content[0]&&data.content[0].text
      ? data.content[0].text : 'Пустой ответ, попробуй ещё раз.';
    hist.push({role:'assistant',content:reply});
    addMsg('assistant',reply);
  })
  .catch(function(e){
    hideTyping();
    addMsg('assistant','⚠️ Ошибка: '+e.message+'\n\nДля работы AI-помощника нужен HTTPS и разрешение CORS от Anthropic. Попробуй открыть сайт через GitHub Pages.');
  })
  .finally(function(){loading=false;sendBtn.disabled=false;});
}

sendBtn.addEventListener('click',function(){ask(inp.value);});
inp.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask(inp.value);}
});
inp.addEventListener('input',function(){
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,80)+'px';
});
</script>
</body>
</html>
